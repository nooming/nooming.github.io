<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff7e5f">
    <meta name="description" content="全国Citywalk定制路线规划，发现城市之美，支持北京、上海、广州、深圳、成都、杭州、香港、澳门等城市">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚶</text></svg>">
    <title>全国Citywalk · 定制路线规划</title>
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'dd98c8e83161c0d87e596a17f2d29750'
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=4ade0b9a9942f8c1d5b470525887a258&plugin=AMap.Marker,AMap.InfoWindow,AMap.Weather" async defer onload="initMap()" onerror="mapLoadError()"></script>
    <link rel="stylesheet" href="styles.css">
    
    <!-- 引入 html2canvas 用于生成分享图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="container"></div>

    <!-- 悬浮返回主页按钮（地图上的圆形按钮） -->
    <button class="back-home-fab" onclick="window.location.href='../'">
        ←
    </button>

    <!-- 分步骤加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="loading-title">🚶 正在规划您的专属路线</div>
            <div class="loading-steps">
                <div class="loading-step" id="step1">
                    <span class="step-icon">🗺️</span>
                    <span class="step-text">计算最优路径...</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step2">
                    <span class="step-icon">☕</span>
                    <span class="step-text">沿途搜寻好店...</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step3">
                    <span class="step-icon">🚶</span>
                    <span class="step-text">优化路线顺序...</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step4">
                    <span class="step-icon">✨</span>
                    <span class="step-text">生成精美路线...</span>
                    <span class="step-status"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="control-panel">
        <div class="panel-header">
            <h2>
                <span class="panel-header-title-text">您的Citywalk定制器</span>
            </h2>
        </div>
        <div class="panel-body">
            <!-- 城市选择器 -->
            <div class="city-selector" style="margin-bottom: 16px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); padding: 12px; border-radius: var(--radius-md);">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <span style="font-size: 18px;">📍</span>
                    <span style="font-weight: 600; color: white; font-size: 14px;">当前城市</span>
                    <span id="currentCity" style="font-weight: 700; color: white; font-size: 16px;">定位中...</span>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input type="text" id="cityInput" placeholder="输入城市名切换（如：北京、香港）" style="flex: 1; padding: 8px 12px; border: none; border-radius: var(--radius-sm); font-size: 13px;">
                    <button onclick="switchCity()" style="padding: 8px 16px; background: white; color: var(--primary); border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 13px;">切换</button>
                </div>
                <div style="margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;">
                    <span style="font-size: 11px; color: rgba(255,255,255,0.9);">热门：</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('北京')">北京</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('上海')">上海</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('广州')">广州</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('深圳')">深圳</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('成都')">成都</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('杭州')">杭州</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('香港')">香港</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('澳门')">澳门</span>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-box" style="margin-bottom: 16px;">
                <input type="text" id="searchInput" placeholder="🔍 搜索地址（输入后回车定位）" style="width: 100%; padding: 12px 16px; border: 2px solid var(--border-light); border-radius: var(--radius-md); font-size: 14px; transition: all 0.3s;">
            </div>

            <!-- 天气卡片 -->
            <div class="weather-card" id="weatherCard" style="cursor: pointer;" title="点击刷新天气">
                <div class="weather-icon" id="weatherIcon">🌤️</div>
                <div class="weather-info">
                    <div class="title" id="weatherTitle">加载中...</div>
                    <div class="desc" id="weatherDesc">正在获取实时天气</div>
                </div>
            </div>

            <!-- 起终点状态 -->
            <div class="status-group">
                <div class="status-card" id="startCard">
                    <div class="label">📍 起点</div>
                    <div class="value" id="startValue">点击地图选择</div>
                </div>
                <div class="status-card" id="endCard">
                    <div class="label">🏁 终点</div>
                    <div class="value" id="endValue">点击地图选择</div>
                </div>
            </div>

            <!-- 使用提示 -->
            <div class="tips-box" style="background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 12px; color: #0369a1;">
                💡 <strong>操作提示：</strong>点击地图选择起点和终点，或在上方搜索框输入地址
            </div>

            <!-- 筛选条件 -->
            <div class="filter-group">
                <div class="filter-title">路线偏好</div>
                <div class="poi-type-group">
                    <div class="poi-type-btn active" data-type="无偏好">无偏好</div>
                    <div class="poi-type-btn" data-type="自然">🌳 自然</div>
                    <div class="poi-type-btn" data-type="历史">🏛️ 历史</div>
                    <div class="poi-type-btn" data-type="文创">✨ 文创</div>
                    <div class="poi-type-btn" data-type="花店">💐 花店</div>
                    <div class="poi-type-btn" data-type="咖啡">☕ 咖啡</div>
                    <div class="poi-type-btn" data-type="甜品">🍰 甜品</div>
                    <div class="poi-type-btn" data-type="烘焙">🥐 烘焙</div>
                </div>

                <div class="filter-title">计划游玩时间</div>
                <div class="time-slider-group" style="padding: 8px 0;">
                    <input type="range" id="planTimeSlider" min="30" max="180" value="60" style="width: 100%; accent-color: var(--primary);">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-top: 4px;">
                        <span>30分钟</span>
                        <span id="planTimeValue" style="font-weight: 600; color: var(--primary);">60 分钟</span>
                        <span>3小时</span>
                    </div>
                </div>
            </div>

            <!-- 功能按钮 -->
            <div class="btn-group">
                <button class="btn btn-reset" onclick="resetSelection()">重置选择</button>
                <button class="btn btn-plan" id="btnPlan" onclick="generateRoute()" disabled>等待选择起终点</button>
            </div>

            <button class="btn-generate-plan" id="btnGeneratePlan" onclick="generatePlanText()">生成游玩文字方案</button>

            <!-- 新增：生成分享图片按钮 -->
            <button class="btn-generate-plan" id="btnShareImage" onclick="generateShareImage()" style="margin-top: 12px; background: linear-gradient(135deg, #667eea, #764ba2); display: none;">
                📸 生成朋友圈分享图
            </button>

            <!-- 结果展示 -->
            <div class="result-area" id="resultArea">
                <div class="result-header">路线规划完成</div>
                <div class="result-item">
                    <div class="label">总距离</div>
                    <div class="value highlight" id="distanceValue">--</div>
                </div>
                <div class="result-item">
                    <div class="label">预计耗时</div>
                    <div class="value highlight" id="durationValue">--</div>
                </div>
                <div class="result-item">
                    <div class="label">打卡点</div>
                    <div class="value highlight" id="poiCountValue">0个</div>
                </div>
                <div class="poi-list" id="poiList"></div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let map = null;
        let startPoint = null;
        let endPoint = null;
        let startMarker = null;
        let endMarker = null;
        let routeLine = null;
        let poiMarkers = [];
        let infoWindow = null;
        let selectedPoiType = "无偏好";
        let routeData = null;
        let debounceTimer = null;
        let shanghaiWeather = null;
        let currentTheme = null;
        let currentCity = "北京";
        let currentCityCenter = [116.4074, 39.9042];

        // API 基础地址配置 - 根据环境自动切换
        const API_BASE_URL =
            window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:5000'
                : 'https://citywalk-backend.zeabur.app';

        // 主题配色方案
        const colorThemes = [
            { name: '日落橙', primary: '#ff7e5f', primaryLight: '#feb47b', primaryDark: '#e85d40' },
            { name: '薄荷绿', primary: '#11998e', primaryLight: '#38ef7d', primaryDark: '#0d7a6e' },
            { name: '珊瑚粉', primary: '#ff6b6b', primaryLight: '#feca57', primaryDark: '#ee5a5a' },
            { name: '深海蓝', primary: '#4facfe', primaryLight: '#00f2fe', primaryDark: '#3d9be5' },
            { name: '紫罗兰', primary: '#a18cd1', primaryLight: '#fbc2eb', primaryDark: '#8a7bc8' },
            { name: '樱花粉', primary: '#f093fb', primaryLight: '#f5576c', primaryDark: '#e07ce8' },
            { name: '森林绿', primary: '#56ab2f', primaryLight: '#a8e063', primaryDark: '#4a9a28' },
            { name: '焦糖棕', primary: '#8B4513', primaryLight: '#D2691E', primaryDark: '#6d360f' }
        ];

        // 设置随机主题色
        function setRandomTheme() {
            currentTheme = colorThemes[Math.floor(Math.random() * colorThemes.length)];
            const root = document.documentElement;
            root.style.setProperty('--primary', currentTheme.primary);
            root.style.setProperty('--primary-light', currentTheme.primaryLight);
            root.style.setProperty('--primary-dark', currentTheme.primaryDark);
            console.log('当前主题:', currentTheme.name);
        }

        // 页面加载时设置随机主题
        setRandomTheme();

        // 地图加载失败处理
        function mapLoadError() {
            showToast("高德地图加载失败，请刷新页面重试");
        }

        // 设置默认城市为上海人民广场
        function setDefaultCity() {
            currentCity = '上海';
            currentCityCenter = [121.4737, 31.2304]; // 上海人民广场附近
            document.getElementById('currentCity').textContent = currentCity;

            // 更新地图中心
            if (map) {
                map.setCenter(currentCityCenter);
                map.setZoom(13);
            }

            console.log('已设置为默认城市：上海');
        }

        // 切换城市
        function switchCity() {
            const cityInput = document.getElementById('cityInput');
            const city = cityInput.value.trim();
            if (!city) {
                showToast('请输入城市名称');
                return;
            }
            quickSwitchCity(city);
        }

        // 快速切换城市
        function quickSwitchCity(city) {
            // 检查是否是已知城市
            const CITY_COORDS = {
                "北京": [116.4074, 39.9042],
                "上海": [121.4737, 31.2304],
                "广州": [113.2644, 23.1291],
                "深圳": [114.0579, 22.5431],
                "成都": [104.0668, 30.5728],
                "杭州": [120.1551, 30.2741],
                "南京": [118.7969, 32.0603],
                "武汉": [114.3054, 30.5931],
                "西安": [108.9398, 34.3416],
                "重庆": [106.5516, 29.5630],
                "天津": [117.2009, 39.0842],
                "苏州": [120.5853, 31.2989],
                "香港": [114.1694, 22.3193],
                "澳门": [113.5491, 22.1987]
            };

            if (CITY_COORDS[city]) {
                // 已知城市，直接使用预设坐标
                currentCityCenter = CITY_COORDS[city];
                applyCityChange(city, currentCityCenter);
            } else {
                // 未知城市，使用高德地理编码验证是否为有效城市
                showToast(`🔍 正在验证 "${city}"...`);
                AMap.plugin('AMap.Geocoder', function() {
                    const geocoder = new AMap.Geocoder({
                        city: '全国',
                        radius: 50000
                    });
                    geocoder.getLocation(city, function(status, result) {
                        if (status === 'complete' && result.geocodes && result.geocodes.length > 0) {
                            const geocode = result.geocodes[0];
                            const addressComponent = geocode.addressComponent || {};
                            const formattedAddress = geocode.formattedAddress || '';

                            // 获取返回的城市和省份名称
                            const returnedCity = (addressComponent.city || '').replace('市', '');
                            const returnedProvince = (addressComponent.province || '').replace('省', '').replace('市', '');

                            // 严格验证：输入的城市名必须与返回的城市名或省份名匹配
                            // 或者输入的是知名城市的简称（如"北京"对应"北京市"）
                            const isValidCity =
                                returnedCity === city ||
                                returnedProvince === city ||
                                (addressComponent.city && addressComponent.city.includes(city)) ||
                                (addressComponent.province && addressComponent.province.includes(city));

                            // 检查地址中是否包含非城市级别的关键词（如街道、路、号楼等）
                            const nonCityKeywords = ['街道', '路', '号', '楼', '单元', '室', '镇', '乡', '村', '区'];
                            const hasNonCityKeyword = nonCityKeywords.some(kw => {
                                // 检查输入中是否包含这些关键词（不是地址中）
                                return city.includes(kw);
                            });

                            // 检查输入是否包含具体地点名称（如景点、建筑等）
                            const specificLocationKeywords = ['明珠', '外滩', '故宫', '长城', '东方', '塔', '广场', '公园'];
                            const hasSpecificLocation = specificLocationKeywords.some(kw => city.includes(kw));

                            if (isValidCity && !hasNonCityKeyword && !hasSpecificLocation) {
                                const location = geocode.location;
                                currentCityCenter = [location.lng, location.lat];
                                applyCityChange(city, currentCityCenter);
                            } else {
                                showToast(`❌ "${city}" 不是一个有效的城市名称，请输入正确的城市名（如：北京、上海）`);
                                document.getElementById('cityInput').value = '';
                                document.getElementById('cityInput').focus();
                            }
                        } else {
                            showToast(`❌ 未找到城市 "${city}"，请检查城市名称`);
                            document.getElementById('cityInput').value = '';
                            document.getElementById('cityInput').focus();
                        }
                    });
                });
            }
        }

        // 应用城市切换
        function applyCityChange(city, center) {
            currentCity = city;
            currentCityCenter = center;
            document.getElementById('currentCity').textContent = currentCity;
            document.getElementById('cityInput').value = '';

            // 更新地图中心
            if (map) {
                map.setCenter(currentCityCenter);
                map.setZoom(13);
            }

            // 重置路线选择
            resetSelection();

            showToast(`已切换到：${currentCity}`);
        }

        // 获取上海天气（增加主动刷新逻辑）
        function getShanghaiWeather(forceRefresh = false) {
            // 如果已有天气数据且不强制刷新，直接更新UI
            if (shanghaiWeather && !forceRefresh) {
                updateWeatherUI(
                    `${shanghaiWeather.weather} ${shanghaiWeather.temperature}℃`,
                    `风向${shanghaiWeather.windDirection} ${shanghaiWeather.windPower}级 | 湿度${shanghaiWeather.humidity}%`,
                    getWeatherIcon(shanghaiWeather.weather)
                );
                return;
            }

            if (!window.AMap || !AMap.Weather) {
                updateWeatherUI("天气加载失败", "无法获取天气数据", "⛅");
                return;
            }

            // 显示加载状态
            updateWeatherUI("加载中...", "正在获取上海实时天气", "🌤️");

            const weather = new AMap.Weather();
            weather.getLive('上海市', function(err, data) {
                if (err || !data) {
                    updateWeatherUI("天气加载失败", "建议出行前查看实时天气", "⛅");
                    return;
                }

                shanghaiWeather = {
                    temperature: data.temperature,
                    weather: data.weather,
                    windDirection: data.windDirection,
                    windPower: data.windPower,
                    humidity: data.humidity,
                    updateTime: new Date() // 记录更新时间
                };

                // 更新天气UI
                updateWeatherUI(
                    `${data.weather} ${data.temperature}℃`,
                    `风向${data.windDirection} ${data.windPower}级 | 湿度${data.humidity}% | 刚刚更新`,
                    getWeatherIcon(data.weather)
                );
            });
        }

        // 定时刷新天气（每5分钟）
        function startWeatherRefresh() {
            // 立即获取一次
            getShanghaiWeather(true);
            // 每5分钟刷新一次
            setInterval(() => {
                getShanghaiWeather(true);
            }, 5 * 60 * 1000);
        }

        // 根据天气类型获取对应图标
        function getWeatherIcon(weather) {
            if (weather.includes('晴')) return '☀️';
            if (weather.includes('云')) return '☁️';
            if (weather.includes('雨')) return '🌧️';
            if (weather.includes('雪')) return '❄️';
            if (weather.includes('风')) return '🌬️';
            return '⛅';
        }

        // 更新天气卡片UI
        function updateWeatherUI(title, desc, icon) {
            document.getElementById('weatherIcon').textContent = icon;
            document.getElementById('weatherTitle').textContent = title;
            document.getElementById('weatherDesc').textContent = desc;
        }

        // 初始化地图
        function initMap() {
            if (!window.AMap) {
                showToast("高德地图加载失败，请检查网络或Key有效性");
                return;
            }

            try {
                map = new AMap.Map('container', {
                    zoom: 13,
                    center: currentCityCenter,
                    viewMode: '2D',
                    clickEnable: true,
                    dragEnable: true,
                    resizeEnable: true
                });

                infoWindow = new AMap.InfoWindow({
                    offset: new AMap.Pixel(0, -30)
                });

                // 地图点击选点逻辑
                map.on('click', function(e) {
                    const lng = e.lnglat.lng;
                    const lat = e.lnglat.lat;
                    const point = {
                        lng: parseFloat(lng.toFixed(6)),
                        lat: parseFloat(lat.toFixed(6))
                    };

                    if (!startPoint) {
                        setStartPoint(point);
                    } else if (!endPoint) {
                        setEndPoint(point);
                    } else {
                        if (confirm("已选择起终点，是否重新选择？")) {
                            resetSelection();
                            setStartPoint(point);
                        }
                    }
                });

                // 启动天气定时刷新
                startWeatherRefresh();

                // 设置默认城市（上海）
                setDefaultCity();

                console.log("地图初始化成功");
            } catch (e) {
                showToast(`地图初始化失败：${e.message}`);
                console.error("地图初始化错误：", e);
            }
        }

        // 显示提示框（防抖）
        function showToast(message, duration = 3000) {
            clearTimeout(debounceTimer);
            const toast = document.getElementById('errorToast');
            toast.textContent = message;
            toast.style.display = 'block';

            debounceTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        // 设置起点
        function setStartPoint(point) {
            startPoint = point;
            if (startMarker) map.remove(startMarker);

            startMarker = new AMap.Marker({
                position: [point.lng, point.lat],
                title: '起点',
                icon: new AMap.Icon({
                    size: new AMap.Size(25, 34),
                    image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
                    imageSize: new AMap.Size(25, 34)
                }),
                offset: new AMap.Pixel(-12, -34),
                zIndex: 100
            });
            map.add(startMarker);

            document.getElementById('startCard').className = 'status-card selected';
            document.getElementById('startValue').textContent = '定位中...';

            // 逆地理编码获取地址名称
            reverseGeocode(point.lng, point.lat, function(address) {
                document.getElementById('startValue').textContent = address || `(${point.lng.toFixed(4)}, ${point.lat.toFixed(4)})`;
                startPoint.address = address;
            });

            updateBtnStatus();
        }

        // 设置终点
        function setEndPoint(point) {
            endPoint = point;
            if (endMarker) map.remove(endMarker);

            endMarker = new AMap.Marker({
                position: [point.lng, point.lat],
                title: '终点',
                icon: new AMap.Icon({
                    size: new AMap.Size(25, 34),
                    image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                    imageSize: new AMap.Size(25, 34)
                }),
                offset: new AMap.Pixel(-12, -34),
                zIndex: 100
            });
            map.add(endMarker);

            document.getElementById('endCard').className = 'status-card selected';
            document.getElementById('endValue').textContent = '定位中...';

            // 逆地理编码获取地址名称
            reverseGeocode(point.lng, point.lat, function(address) {
                document.getElementById('endValue').textContent = address || `(${point.lng.toFixed(4)}, ${point.lat.toFixed(4)})`;
                endPoint.address = address;
            });

            updateBtnStatus();
        }

        // 逆地理编码
        function reverseGeocode(lng, lat, callback) {
            if (!window.AMap) {
                callback(null);
                return;
            }

            AMap.plugin('AMap.Geocoder', function() {
                const geocoder = new AMap.Geocoder({ city: currentCity });
                geocoder.getAddress([lng, lat], function(status, result) {
                    if (status === 'complete' && result.regeocode) {
                        const address = result.regeocode.formattedAddress;
                        // 简化地址显示（去掉城市前缀）
                        const shortAddress = address.replace(new RegExp(`^${currentCity}市?`), '').replace(/^中国/, '');
                        callback(shortAddress || address);
                    } else {
                        callback(null);
                    }
                });
            });
        }

        // 更新按钮状态
        function updateBtnStatus() {
            const btn = document.getElementById('btnPlan');
            const planTimeSlider = document.getElementById('planTimeSlider');
            const planTime = parseInt(planTimeSlider.value);

            const isTimeValid = !isNaN(planTime) && planTime >= 30 && planTime <= 180;
            const isPointValid = !!startPoint && !!endPoint;

            if (isPointValid && isTimeValid) {
                btn.disabled = false;
                btn.innerText = "生成路线";
            } else {
                btn.disabled = true;
                if (!isPointValid) {
                    btn.innerText = "等待选择起终点";
                } else {
                    btn.innerText = "请设置游玩时间";
                }
            }
        }

        // 生成路线
        function generateRoute() {
            if (!startPoint || !endPoint) {
                showToast("请先选择起终点");
                return;
            }

            const planTimeSlider = document.getElementById('planTimeSlider');
            let planTime = parseInt(planTimeSlider.value, 10);

            if (isNaN(planTime) || planTime < 30 || planTime > 180) {
                showToast("请设置30-180分钟的游玩时间");
                return;
            }

            const start = [parseFloat(startPoint.lng.toFixed(6)), parseFloat(startPoint.lat.toFixed(6))];
            const end = [parseFloat(endPoint.lng.toFixed(6)), parseFloat(endPoint.lat.toFixed(6))];

            // 显示分步骤加载动画
            showLoadingSteps();

            // 创建超时控制器
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000); // 30秒超时

            fetch(`${API_BASE_URL}/plan`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    start: start,
                    end: end,
                    plan_time: planTime,
                    poi_type: selectedPoiType.trim()
                }),
                signal: controller.signal
            })
            .then(response => {
                clearTimeout(timeoutId);
                if (!response.ok) {
                    // 尝试解析后端返回的JSON错误详情
                    return response.json().then(errData => {
                        const detail = errData.message || errData.error || `HTTP错误：${response.status}`;
                        throw new Error(detail);
                    }).catch(() => {
                        throw new Error(`HTTP错误：${response.status}`);
                    });
                }
                return response.json().catch(err => {
                    throw new Error("后端返回数据格式错误");
                });
            })
            .then(data => {
                hideLoadingSteps();
                if (!data.success) {
                    showToast(`路线规划失败：${data.message || '未知错误'}`);
                    return;
                }

                routeData = data;

                if (routeLine) map.remove(routeLine);
                // 绘制路线 - 使用当前主题色
                const routeColor = currentTheme ? currentTheme.primary : '#ff7e5f';
                routeLine = new AMap.Polyline({
                    path: data.path,
                    strokeColor: routeColor,
                    strokeWeight: 6,
                    strokeOpacity: 0.9,
                    strokeStyle: 'solid',
                    lineJoin: 'round',
                    lineCap: 'round',
                    zIndex: 50,
                    showDir: true  // 显示方向箭头
                });
                map.add(routeLine);

                // 添加带有序号的POI标记
                addPoiMarkers(data.pois);

                map.setFitView([startMarker, endMarker, routeLine, ...poiMarkers], {
                    padding: [50, 50, 50, 50],
                    animate: true
                });

                document.getElementById('distanceValue').textContent =
                    (data.distance / 1000).toFixed(2) + ' km';
                
                // 计算总耗时：步行时间 + POI停留时间（每个POI约5分钟）
                const walkDuration = data.duration || 0;
                const poiStayTime = (data.pois ? data.pois.length : 0) * 5;
                const totalDuration = walkDuration + poiStayTime;
                document.getElementById('durationValue').textContent = totalDuration + ' 分钟';
                
                document.getElementById('poiCountValue').textContent =
                    data.pois.length + '个';

                const poiList = document.getElementById('poiList');
                poiList.innerHTML = '';
                if (poiList) {
                    const pois = Array.isArray(data.pois) ? data.pois : [];
                    if (pois.length > 0) {
                        pois.forEach((poi, index) => {
                            const poiName = poi.name || '未知名称';
                            const poiType = poi.type || '未知类型';
                            const poiIcon = poi.icon || '📍';

                            const poiItem = document.createElement('div');
                            poiItem.className = 'poi-item';
                            poiItem.onclick = () => {
                                if (poi.location && Array.isArray(poi.location) && poi.location.length === 2) {
                                    map.setCenter(poi.location);
                                    map.setZoom(17);
                                }
                            };
                            poiItem.innerHTML = `
                                <div style="display: flex; align-items: flex-start; gap: 8px;">
                                    <span style="font-size: 18px;">${poiIcon}</span>
                                    <div style="flex: 1;">
                                        <strong>${index+1}. ${poiName}</strong>
                                        <div style="font-size: 11px; color: #94a3b8; margin-top: 2px;">${poiType}</div>
                                    </div>
                                </div>
                            `;
                            poiList.appendChild(poiItem);
                        });
                    } else {
                        poiList.innerHTML = `
                            <div class="poi-item" style="color: var(--text-light, #999);">
                                暂无推荐打卡点
                            </div>
                        `;
                    }
                }

                const resultArea = document.getElementById('resultArea');
                if (resultArea) resultArea.style.display = 'block';
                const btnGeneratePlan = document.getElementById('btnGeneratePlan');
                if (btnGeneratePlan) btnGeneratePlan.style.display = 'block';
                const btnShareImage = document.getElementById('btnShareImage');
                // 手机端隐藏生成图片按钮
                const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                if (btnShareImage && !isMobileDevice) btnShareImage.style.display = 'block';

                // 生成路线后主动刷新天气
                getShanghaiWeather(true);
            })
            .catch(error => {
                hideLoadingSteps();
                let errorMsg = '';
                if (error.name === 'AbortError') {
                    errorMsg = "请求超时（30秒），请检查后端服务是否运行";
                } else if (error.message.includes('timeout')) {
                    errorMsg = "请求超时，请检查网络或后端服务是否运行";
                } else if (error.message.includes('Failed to fetch')) {
                    errorMsg = "无法连接到后端服务，请确认：1.后端已启动 2.地址端口正确 3.已配置跨域";
                } else if (error.message.includes('JSON')) {
                    errorMsg = "后端返回数据格式错误，请检查接口返回值";
                } else {
                    errorMsg = `请求失败：${error.message}`;
                }
                showToast(errorMsg);
                console.error('路线规划错误：', error);
            });
        }

// 生成分享长图（仅电脑端，使用屏幕截取）
async function generateShareImage() {
    if (!routeData || !routeData.success) {
        showToast("请先生成有效的路线规划！");
        return;
    }

    // 检测是否为移动端
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile) {
        showToast("📱 手机端暂不支持生成图片，请在电脑上使用");
        return;
    }

    showToast("🎨 请选择要截取的窗口或屏幕区域...");

    // ========== 第一步：屏幕截取 ==========
    let mapImageDataUrl = null;

    try {
        // 使用 getDisplayMedia 让用户选择截取区域
        const stream = await navigator.mediaDevices.getDisplayMedia({
            video: { mediaSource: 'screen' },
            preferCurrentTab: true
        });
        
        const video = document.createElement('video');
        video.srcObject = stream;
        await video.play();
        
        // 等待视频加载
        await new Promise(resolve => setTimeout(resolve, 300));
        
        // 截取当前帧
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        
        // 停止流
        stream.getTracks().forEach(track => track.stop());
        
        mapImageDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        showToast("✅ 截取成功，正在生成长图...");

        // 搜索地址（使用PlaceSearch支持模糊搜索，支持全国范围）
        function searchAddress(keyword) {
            if (!window.AMap) {
                showToast("地图未加载，请稍后重试");
                return;
            }

            showToast(`🔍 正在搜索 "${keyword}"...`);

            // 先尝试使用 PlaceSearch 进行POI搜索（支持模糊匹配，全国范围）
            AMap.plugin('AMap.PlaceSearch', function() {
                const placeSearch = new AMap.PlaceSearch({
                    city: '全国',  // 改为全国搜索
                    citylimit: false,  // 不限制城市
                    pageSize: 10,
                    pageIndex: 1
                });

                placeSearch.search(keyword, function(status, result) {
                    if (status === 'complete' && result.info === 'OK' && result.poiList && result.poiList.pois.length > 0) {
                        // 找到POI结果
                        const pois = result.poiList.pois;
                        const poi = pois[0];  // 取第一个结果

                        // 检查搜索结果是否在当前城市附近（500公里内）
                        const poiLng = poi.location.lng;
                        const poiLat = poi.location.lat;
                        const distance = calculateDistance(currentCityCenter[0], currentCityCenter[1], poiLng, poiLat);

                        // 如果距离太远（超过500公里），提示用户
                        if (distance > 500000) {
                            showToast(`⚠️ "${poi.name}" 距离当前城市较远（${(distance/1000).toFixed(0)}公里），正在跳转...`);
                        }

                        // 在地图上标记位置
                        const marker = new AMap.Marker({
                            position: [poiLng, poiLat],
                            title: poi.name
                        });
                        map.add(marker);

                        // 设置地图中心和缩放（无论多远都跳转）
                        map.setCenter([poiLng, poiLat]);
                        map.setZoom(17);

                        // 显示信息窗体
                        const infoWindow = new AMap.InfoWindow({
                            content: `<div style="padding: 10px; font-size: 14px;">
                                <strong>${poi.name}</strong><br/>
                                <span style="color: #666; font-size: 12px;">${poi.address || ''}</span><br/>
                                <span style="color: #ff7e5f; font-size: 12px;">点击地图设为起点或终点</span>
                            </div>`,
                            offset: new AMap.Pixel(0, -30)
                        });
                        infoWindow.open(map, [poiLng, poiLat]);

                        showToast(`✅ 找到 "${poi.name}"，点击地图选择为起点或终点`);

                        // 3秒后清除标记和信息窗
                        setTimeout(() => {
                            map.remove(marker);
                            infoWindow.close();
                        }, 5000);
                    } else {
                        // POI搜索无结果，尝试地理编码（全国范围）
                        tryGeocodeSearch(keyword);
                    }
                });
            });
        }

        // 计算两点间距离（米）
        function calculateDistance(lng1, lat1, lng2, lat2) {
            const radLat1 = lat1 * Math.PI / 180;
            const radLat2 = lat2 * Math.PI / 180;
            const a = radLat1 - radLat2;
            const b = lng1 * Math.PI / 180 - lng2 * Math.PI / 180;
            const s = 2 * Math.asin(Math.sqrt(Math.pow(Math.sin(a / 2), 2) +
                Math.cos(radLat1) * Math.cos(radLat2) * Math.pow(Math.sin(b / 2), 2)));
            return s * 6378137;  // 地球半径（米）
        }

        // 移动端触摸手势支持 - 流畅的展开/收起
        (function initTouchGestures() {
            const controlPanel = document.querySelector('.control-panel');
            if (!controlPanel) return;

            const header = controlPanel.querySelector('.panel-header');
            if (!header) return;

            let startY = 0;
            let startTime = 0;
            let isExpanded = false;
            let isDragging = false;
            let hasMoved = false;

            // 检测是否为移动设备
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            if (!isMobile) return;

            // 切换展开/收起状态
            function togglePanel(expand) {
                isExpanded = expand !== undefined ? expand : !isExpanded;
                if (isExpanded) {
                    controlPanel.classList.add('expanded');
                } else {
                    controlPanel.classList.remove('expanded');
                }
            }

            // 点击头部切换（还原为：点击整个头部都可以展开/收起）
            header.addEventListener('click', function(e) {
                if (hasMoved) return; // 如果是拖动操作，不触发点击
                togglePanel();
            });

            // 触摸开始
            header.addEventListener('touchstart', function(e) {
                startY = e.touches[0].clientY;
                startTime = Date.now();
                isDragging = true;
                hasMoved = false;
                header.style.cursor = 'grabbing';
            }, { passive: true });

            // 触摸移动 - 检测滑动方向
            header.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                
                const currentY = e.touches[0].clientY;
                const deltaY = startY - currentY;
                
                // 移动超过 10px 认为是拖动
                if (Math.abs(deltaY) > 10) {
                    hasMoved = true;
                }
                
                // 根据滑动方向实时反馈
                if (deltaY > 30 && !isExpanded) {
                    // 向上滑动，准备展开
                    header.style.transform = 'translateY(-2px)';
                } else if (deltaY < -30 && isExpanded) {
                    // 向下滑动，准备收起
                    header.style.transform = 'translateY(2px)';
                }
            }, { passive: true });

            // 触摸结束
            header.addEventListener('touchend', function(e) {
                if (!isDragging) return;
                isDragging = false;
                header.style.cursor = 'grab';
                header.style.transform = '';

                const endY = e.changedTouches[0].clientY;
                const deltaY = startY - endY;
                const deltaTime = Date.now() - startTime;

                // 快速滑动（轻扫）
                if (deltaTime < 300 && Math.abs(deltaY) > 50) {
                    if (deltaY > 0) {
                        togglePanel(true); // 向上轻扫，展开
                    } else {
                        togglePanel(false); // 向下轻扫，收起
                    }
                } else if (Math.abs(deltaY) > 80) {
                    // 慢速但滑动距离大
                    if (deltaY > 0) {
                        togglePanel(true);
                    } else {
                        togglePanel(false);
                    }
                }
                // 否则认为是点击，由 click 事件处理
            }, { passive: true });

            // 阻止头部区域的默认滚动行为
            header.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            // 面板内容区域滚动时，如果滚动到顶部继续下拉则收起面板
            const panelBody = controlPanel.querySelector('.panel-body');
            if (panelBody) {
                let bodyStartY = 0;
                
                panelBody.addEventListener('touchstart', function(e) {
                    bodyStartY = e.touches[0].clientY;
                }, { passive: true });

                panelBody.addEventListener('touchmove', function(e) {
                    const currentY = e.touches[0].clientY;
                    const deltaY = currentY - bodyStartY;
                    
                    // 如果已经在顶部且继续向下滑动
                    if (panelBody.scrollTop <= 0 && deltaY > 30) {
                        // 阻止默认滚动，准备收起面板
                        if (deltaY > 50) {
                            togglePanel(false);
                        }
                    }
                }, { passive: true });
            }
        })();

        // 移动端双击放大地图
        (function initMapDoubleTap() {
            const container = document.getElementById('container');
            if (!container) return;

            let lastTapTime = 0;
            let lastTapX = 0;
            let lastTapY = 0;

            container.addEventListener('touchend', function(e) {
                const currentTime = new Date().getTime();
                const tapX = e.changedTouches[0].clientX;
                const tapY = e.changedTouches[0].clientY;
                const tapLength = currentTime - lastTapTime;

                if (tapLength < 300 && tapLength > 0) {
                    // 双击检测
                    const distance = Math.sqrt(
                        Math.pow(tapX - lastTapX, 2) + Math.pow(tapY - lastTapY, 2)
                    );
                    if (distance < 30 && map) {
                        e.preventDefault();
                        const currentZoom = map.getZoom();
                        map.setZoom(currentZoom + 1);
                    }
                }

                lastTapTime = currentTime;
                lastTapX = tapX;
                lastTapY = tapY;
            });
        })();

        // 阻止移动端默认滚动行为（在地图区域）
        document.getElementById('container').addEventListener('touchmove', function(e) {
            // 允许地图正常滚动
            e.stopPropagation();
        }, { passive: true });

        // 点击地图区域收起面板
        (function initMapTapToClose() {
            const container = document.getElementById('container');
            const controlPanel = document.querySelector('.control-panel');
            if (!container || !controlPanel) return;

            container.addEventListener('touchstart', function(e) {
                // 如果面板是展开的，点击地图收起
                if (controlPanel.classList.contains('expanded')) {
                    controlPanel.classList.remove('expanded');
                }
            }, { passive: true });
        })();
    </script>
    <script src="app.js"></script>
</body>
