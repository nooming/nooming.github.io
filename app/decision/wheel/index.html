<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="theme-color" content="#FFFA00">
    <meta name="description" content="可编辑项的随机转盘；预设与历史。">
    <meta name="keywords" content="在线转盘,随机选择,抽奖工具,选择困难症,决策工具">
    
    <title>转盘</title>

    <link rel="apple-touch-icon" sizes="180x180" href="../../../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../assets/icons/favicon-16x16.png">
    <link rel="manifest" href="../../../assets/icons/site.webmanifest">
    <link rel="shortcut icon" href="../../../assets/icons/favicon.ico">

    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link as="style" href="../assets/css/style.min.css" rel="preload">
    <link href="../assets/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/decision-shell.css">
    <style>
        .decision-tool-main .wheel-box {
            margin: 0 !important;
            padding: 0 !important;
            background-color: transparent !important;
            border-radius: 0;
            max-width: 100%;
        }

        .decision-tool-main .wheel-scope-box {
            margin-left: 0 !important;
            margin-right: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        .decision-tool-main .wheel-panel-operate-change-box,
        .decision-tool-main .wheel-panel-operate-preset-box {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            padding: 5px !important;
        }

        .decision-tool-main .wheel-panel-operate-change-box:hover,
        .decision-tool-main .wheel-panel-operate-preset-box:hover {
            background-color: rgba(52, 152, 219, 0.1) !important;
            border-radius: 0;
        }
    </style>

    <link as="script" href="../assets/js/script.min.js" rel="preload">

    <link rel="preload" href="../assets/css/spin.min.css" as="style">
    <link href="../assets/css/spin.min.css" rel="stylesheet">

    <link rel="preload" href="../assets/js/wheel.min.js" as="script">
    <link rel="preload" href="../assets/js/jscolor.min.js" as="script">

    <link rel="preload" href="../assets/js/spin.min.js" as="script">

</head>
<body class="page-container decision-tool-page">
    <div class="page-header">
        <div class="header-top">
            <a href="../" class="back-btn">返回上一级</a>
            <a href="../../../index.html" class="back-btn">返回主页</a>
        </div>
        <div class="section-header section-header--page">
            <h1>转盘</h1>
            <p>可编辑项；预设与历史。</p>
        </div>
    </div>
<main class="decision-tool-main">
    <section id="spin" aria-label="互动转盘工具" class="wheel-box">
        <div class="wheel-scope-box">
            <div class="wheel-scope-left-box">
                <div class="my-wheel-box" id="myWheelBox">
                    <div id="my-wheel">
                        <!-- Spin the Wheel Rendering -->
                    </div>
                </div>
            </div>
            <div class="wheel-scope-center-box" onclick="theExpandMode()">
                <!-- Center point, Enlargeable Spin the Wheel -->
            </div>
            <div class="wheel-scope-right-box">
                <div class="wheel-panel-box">
                    <div class="wheel-panel-operate-box">
                        <div class="wheel-panel-operate-left-box">
                            <div class="wheel-panel-operate-entries-box" onclick="switchToEntriesMode()" role="button" tabindex="0" aria-label="切换到选项模式">
                                选项
                            </div>
                            <div class="wheel-panel-operate-results-box" onclick="switchToResultsMode()" role="button" tabindex="0" aria-label="切换到结果模式">
                                结果
                            </div>
                        </div>
                        <div class="wheel-panel-operate-right-box">
                            <div class="wheel-panel-operate-change-box" onclick="switchToChangeMode()" aria-label="切换模式" title="简单 / 高级">
                                <span style="font-size: 0.75rem; display: block; margin-top: 2px; color: #7f8c8d;">模式</span>
                            </div>
                            <div class="wheel-panel-operate-preset-box" aria-label="预设" title="保存与加载选项组合">
                                <span style="font-size: 0.75rem; display: block; margin-top: 2px; color: #7f8c8d;">预设</span>
                                <div class="wheel-preset-box">
                                    <div class="wheel-preset-text-box">
                                        <div class="wheel-preset-text-add-box">
                                            <div class="wheel-preset-text-add-input-box">
                                                <input placeholder="输入预设...">
                                            </div>
                                            <div class="wheel-preset-text-add-add-box">
                                                <div class="wheel-preset-text-add-add-inner-box" aria-label="添加预设">
                                                    +
                                                </div>
                                            </div>
                                        </div>
                                        <div class="wheel-preset-text-list-box">
                                            <div class="wheel-preset-text-overflow-box">
                                                <div class="wheel-preset-text-item-box">
                                                    <!-- JS-generated elements -->
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="wheel-panel-entries-box">
                        <div class="wheel-panel-entries-operate-box">
                            <div class="wheel-panel-entries-operate-left-box">
                                <div class="wheel-panel-entries-operate-shuffle-box" onclick="entriesShuffleSwitchClick()" role="button" tabindex="0" aria-label="随机选项">
                                    随机
                                </div>
                                <div class="wheel-panel-entries-operate-sort-box" onclick="entriesSortSwitchClick()" role="button" tabindex="0" aria-label="排序选项">
                                    排序
                                </div>
                                <div class="wheel-panel-entries-operate-advanced-box" onclick="switchToAdvancedMode()" role="button" tabindex="0" aria-label="切换到高级模式">
                                    高级
                                </div>
                            </div>
                        </div>
                        <div class="wheel-panel-entries-inputs-box">
                            <div class="wheel-panel-entries-inputs-text-box">
                                <textarea id="prize-input" placeholder="输入选项..." wrap="off"></textarea>
                            </div>
                        </div>
                        <div class="wheel-panel-entries-advanced-box">
                            <div class="wheel-panel-entries-advanced-text-box">
                                <div class="wheel-panel-entries-advanced-text-add-box">
                                    <div class="wheel-panel-entries-advanced-text-add-input-box">
                                        <input placeholder="输入选项...">
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-background-color-box">
                                        <div class="wheel-panel-entries-advanced-text-add-background-color-inner-box" data-jscolor="" data-key="add-background-color">
                                            <!-- Custom background color -->
                                        </div>
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-color-box">
                                        <div class="wheel-panel-entries-advanced-text-add-color-inner-box" data-jscolor="" data-key="add-color-color">
                                            <!-- Custom font color -->
                                        </div>
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-add-box">
                                        <div class="wheel-panel-entries-advanced-text-add-add-inner-box" aria-label="添加选项">
                                            +
                                        </div>
                                    </div>
                                </div>
                                <div class="wheel-panel-entries-advanced-text-list-box">
                                    <div class="wheel-panel-entries-advanced-text-overflow-box" id="item-container">
                                        <!-- JS-generated elements -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="wheel-panel-results-box">
                        <div class="wheel-panel-results-operate-box">
                            <div class="wheel-panel-results-operate-left-box">
                                <div class="wheel-panel-results-operate-shuffle-box" onclick="resultsShuffleSwitchClick()" role="button" tabindex="0" aria-label="随机结果">
                                    随机
                                </div>
                                <div class="wheel-panel-results-operate-clear-box" onclick="resultsClearSwitchClick()" role="button" tabindex="0" aria-label="清除结果">
                                    清除
                                </div>
                            </div>
                        </div>
                        <div class="wheel-panel-results-inputs-box">
                            <div class="wheel-panel-results-inputs-text-box">
                                <textarea id="prize-result" readonly wrap="off"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

    <footer class="site-footer" role="contentinfo">
        <p>© 2026 个人站点 · 非商用学习记录</p>
    </footer>

<div class="lucky-modal hidden" id="luckySuccessModal">
    <div class="lucky-modal-content">
        <h2>结果</h2>
        <p id="luckyPrizeText">—</p>
        <button onclick="closeLuckyModal()" aria-label="关闭结果显示">关闭</button>
    </div>
</div>

<script src="../assets/js/decision-storage-guard.js"></script>
<script src="../assets/js/decision-lang-normalize.js"></script>
<script defer src="../assets/js/script.min.js"></script>

<script defer src="../assets/js/wheel.min.js"></script>
<script defer src="../assets/js/jscolor.min.js"></script>

<script defer src="../assets/js/spin.min.js"></script>
</body>
</html>
