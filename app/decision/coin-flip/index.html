<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta name="theme-color" content="#FFFA00">
    <title>抛硬币</title>
    <meta name="description" content="正反面随机；本地统计与最近记录。">
    <meta name="keywords" content="抛硬币,在线抛硬币,随机选择,正反面,决策工具">
    <meta name="author" content="nooming">

    <!-- Open Graph / 社交分享 -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="抛硬币">
    <meta property="og:description" content="正反面随机；本地统计。">

    <link rel="apple-touch-icon" sizes="180x180" href="../../../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../assets/icons/favicon-16x16.png">
    <link rel="manifest" href="../../../assets/icons/site.webmanifest">
    <link rel="shortcut icon" href="../../../assets/icons/favicon.ico">

    <link rel="stylesheet" href="../../../assets/css/common.css">
    <link as="style" href="../assets/css/style.min.css" rel="preload">
    <link href="../assets/css/style.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/decision-shell.css">
    <style>
        /* 覆盖第三方 coin.min.css，保持与全站一致；头部/页脚见 decision-shell.css */
        body.coin-flip-page.decision-tool-page main {
            margin: 0;
            padding: 0;
        }

        body.coin-flip-page.decision-tool-page section {
            margin: 0;
        }

        body.coin-flip-page.decision-tool-page .coin-box {
            margin: 0;
            padding: 0;
            background-color: transparent;
            border-radius: 0;
            width: auto;
            height: auto;
        }

        body.coin-flip-page.decision-tool-page .coin-scope-box {
            margin-left: 0;
            margin-right: 0;
            padding-left: 0;
            padding-right: 0;
        }

        body.coin-flip-page.decision-tool-page .coin-reset-box {
            display: flex;
        }
    </style>

    <!-- 第三方库样式 -->
    <link rel="preload" href="../assets/css/coin.min.css" as="style">
    <link href="../assets/css/coin.min.css" rel="stylesheet">
    <style>
        /* 抛硬币：主硬币、正反面与底部「最近结果」小圆块保持圆形（全站直角的例外） */
        body.coin-flip-page .coin-flip-scope-box,
        body.coin-flip-page .coin,
        body.coin-flip-page .coin-face,
        body.coin-flip-page .heads,
        body.coin-flip-page .tails,
        body.coin-flip-page .coin-recent-item {
            border-radius: 50% !important;
        }
    </style>

    <!-- 第三方库脚本 -->
    <link rel="preload" href="../assets/js/script.min.js" as="script">
    <link rel="preload" href="../assets/js/coin.min.js" as="script">

</head>
<body class="decision-tool-page coin-flip-page">
<header>
    <div class="header-left-box">
        <div class="header-left-content-box">
            <a href="../">返回上一级</a>
        </div>
    </div>
    <div class="header-center-box">
        <h1>抛硬币</h1>
    </div>
    <div class="header-right-box">
        <div class="header-right-content-box">
            <nav class="nav-links">
                <a href="../wheel/">转盘</a>
                <a href="../quick-choice/">多选随机</a>
            </nav>
        </div>
    </div>
</header>
<p class="decision-hub-lead">转盘、抛硬币与多选随机。<a href="../" class="home-hub-link">决策工具</a></p>
<main>
    <section id="flip" aria-label="Interactive coin flip tool" class="coin-box">
        <div class="coin-scope-box">
            <div class="coin-flip-box">
                <div class="coin-flip-scope-box">
                    <div class="coin" id="coin">
                        <div class="coin-face heads">正面</div>
                        <div class="coin-face tails">反面</div>
                    </div>
                </div>
            </div>
            <div class="coin-info-box">
                <div class="coin-reset-box">
                    <div class="coin-reset-scope-box" role="button" tabindex="0" aria-label="重置抛硬币统计">
                        <span>重置</span>
                    </div>
                </div>
                <div class="coin-info-stats-box">
                    <div class="coin-info-stats-scope-box">
                        <div class="coin-info-stats-heads-box">正面</div>
                        <div class="coin-info-stats-total-box">总次数</div>
                        <div class="coin-info-stats-tails-box">反面</div>
                        <div class="coin-info-stats-heads-value-box">0</div>
                        <div class="coin-info-stats-total-value-box">0</div>
                        <div class="coin-info-stats-tails-value-box">0</div>
                    </div>
                </div>
                <div class="coin-info-recent-box">
                    <div class="coin-info-recent-scope-box">
                        <div class="coin-info-recent-overflow-box">
                            <div class="coin-info-inner">
                                <!-- JS-generated elements -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 个人站点 · 非商用学习记录</p>
</footer>

<!-- 第三方库脚本 -->
<script defer src="../assets/js/script.min.js"></script>
<script defer src="../assets/js/coin.min.js"></script>

<!-- 公共工具函数 -->
<script src="../../../assets/js/utils.js" defer></script>
</body>
</html>
