<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="虚拟小区停车：匈牙利精确最优或 PSO 近似；路径可视化。" />
  <meta name="keywords" content="停车分配,PSO,粒子群,匈牙利算法,小区规划,在线工具" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/icons/favicon-16x16.png">
  <link rel="shortcut icon" href="../../assets/icons/favicon.ico">
  <title>停车分配实验</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header>
    <div class="site-tool-bar">
      <a href="../../index.html" class="site-tool-back">返回上一级</a>
    </div>
    <h1>停车分配实验</h1>
    <span class="hint hint--header" title="可拖拽：入口、花坛、楼、车位。内环道路不可拖拽，请在右侧侧栏改数值。车位沿内环停车带吸附；入口吸附内环边线。">
      拖拽：入口、花坛、楼、车位；右侧改内环；车位与入口吸附内环。
    </span>
  </header>
  <div class="layout">
    <div class="canvas-wrap">
      <div class="map-stage">
        <canvas id="map" width="720" height="720" aria-label="小区平面图"></canvas>
        <aside class="map-legend" aria-label="平面图图例">
          <h3 class="map-legend-title">图例</h3>
          <ul class="map-legend-list">
            <li><span class="map-legend-swatch map-legend-swatch--entrance" aria-hidden="true"></span>入口</li>
            <li><span class="map-legend-swatch map-legend-swatch--building" aria-hidden="true"></span>居民楼（楼号）</li>
            <li><span class="map-legend-swatch map-legend-swatch--slot" aria-hidden="true"></span>车位（优化后车→楼）</li>
            <li><span class="map-legend-swatch map-legend-swatch--grass" aria-hidden="true"></span>中央花坛</li>
            <li><span class="map-legend-swatch map-legend-swatch--road" aria-hidden="true"></span>内环道路</li>
            <li><span class="map-legend-swatch map-legend-swatch--strip" aria-hidden="true"></span>泊位带</li>
            <li><span class="map-legend-swatch map-legend-swatch--path" aria-hidden="true"></span>步行路径</li>
            <li><span class="map-legend-swatch map-legend-swatch--select" aria-hidden="true"></span>选中</li>
          </ul>
        </aside>
      </div>
      <p id="map-unit-caption" class="map-caption" aria-hidden="true"></p>
    </div>
    <aside class="sidebar-vehicle" aria-label="车辆目的楼">
      <div class="panel panel--scroll vehicle-targets-panel vehicle-targets-panel--solo">
        <h2>车辆 → 目的楼</h2>
        <p class="panel-note panel-note--vehicle">
          楼号在屋面；优化后车位标车号与目的楼。下拉为每车选楼。
        </p>
        <div class="vehicle-targets-actions">
          <button type="button" id="btn-random-dest">随机各车目的楼</button>
        </div>
        <div id="vehicle-targets-list" class="vehicle-targets-list"></div>
      </div>
    </aside>
    <aside class="sidebar" aria-label="场景与操作">
      <div class="panel">
        <h2>场景参数</h2>
        <p id="lot-dim-hint" class="panel-note"></p>
        <p class="panel-note">
          长度单位为 <strong>m</strong>；优化总时间为 <strong>s</strong>（行车/步行距离 ÷ 假定速度）。
        </p>
        <div class="prop-grid">
          <label for="n-veh">车辆数（辆）</label>
          <input type="number" id="n-veh" min="1" step="1" value="12" />
        </div>
        <div class="prop-grid">
          <label for="optimizer-method">优化方式</label>
          <select id="optimizer-method">
            <option value="exact" selected>匈牙利 · 全局最优总时间</option>
            <option value="pso">PSO · 近似（可看收敛）</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <button type="button" id="btn-add-building">添加居民楼</button>
        <button type="button" id="btn-add-slot">添加车位</button>
        <button type="button" class="danger" id="btn-delete">删除选中</button>
        <button type="button" class="primary" id="btn-run">运行优化</button>
      </div>

      <div class="panel panel--scroll panel--props">
        <h2>选中项属性</h2>
        <div id="props-empty" class="empty-select">
          点画布上的入口、花坛、内环、楼或车位以选中
        </div>
        <div id="props-form" class="prop-grid" hidden></div>
      </div>

      <div class="panel panel--result">
        <h2>优化结果</h2>
        <p id="result-status" class="hint">尚未运行</p>
        <p class="result-value" id="result-gbest" style="display:none"></p>
        <canvas id="chart" width="300" height="168"></canvas>
        <p id="chart-caption" class="chart-caption"></p>
      </div>
    </aside>
  </div>
  <script src="assets/js/optimizer.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
