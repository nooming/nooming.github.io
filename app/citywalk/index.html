<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FFFA00">
    <meta name="description" content="多城步行路线：地图选点、偏好与时长、天气与导出长图。">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='28' r='12' fill='%23ffffff'/%3E%3Cpath fill='%23ff7e5f' d='M38 48c-4 18-6 38-6 52h12V68h12v32h12c0-16-2-34-6-52-6-4-12-6-18-6s-12 2-18 6z'/%3E%3C/svg%3E">
    <title>Citywalk · 步行路线</title>
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: 'dd98c8e83161c0d87e596a17f2d29750'
        }
    </script>
    <script src="assets/shared/utils.js"></script>
    <script>
        function mapLoadError() {
            showToast('地图加载失败，请检查网络或地图 Key 配置', 'error', 4000);
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=4ade0b9a9942f8c1d5b470525887a258&plugin=AMap.Marker,AMap.InfoWindow,AMap.Weather" async defer onerror="mapLoadError()"></script>
    <link rel="stylesheet" href="assets/shared/common.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    
    <!-- 引入 html2canvas 用于生成分享图片 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;">
        <symbol id="cw-walk" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="1.75" cx="12" cy="5" r="2"/><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 22v-6l-2-5h2l2 5v6M15 22v-5l2-8h-2l-1 4"/></symbol>
        <symbol id="cw-map" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round" d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3V6z"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="M9 3v15M15 6v15"/></symbol>
        <symbol id="cw-coffee" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M18 8h1a4 4 0 0 1 0 8h-1M5 8h10v5a4 4 0 0 1-4 4H9a4 4 0 0 1-4-4V8z"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="M6 2v2M10 2v2M14 2v2"/></symbol>
        <symbol id="cw-sparkle" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l1.2 5.2L18 8l-4.8 1.8L12 15l-1.2-5.2L6 8l4.8-1.8L12 2z"/></symbol>
        <symbol id="cw-pin" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 21s7-5 7-11a7 7 0 1 0-14 0c0 6 7 11 7 11z"/><circle fill="currentColor" cx="12" cy="10" r="2.5"/></symbol>
        <symbol id="cw-flag" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" d="M4 22V4"/><path fill="currentColor" d="M4 4h10l-2 4 2 4H4V4z"/></symbol>
        <symbol id="cw-tree" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M12 22V12M8 14l4-10 4 10"/></symbol>
        <symbol id="cw-column" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M8 22V8h8v14M6 8h12M10 8V5h4v3"/></symbol>
        <symbol id="cw-flower" viewBox="0 0 24 24"><circle fill="currentColor" cx="12" cy="12" r="2"/><circle fill="currentColor" cx="12" cy="8" r="2"/><circle fill="currentColor" cx="12" cy="16" r="2"/><circle fill="currentColor" cx="8" cy="12" r="2"/><circle fill="currentColor" cx="16" cy="12" r="2"/></symbol>
        <symbol id="cw-cake" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M4 22h16M6 22v-8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="M8 12V8h8v4"/></symbol>
        <symbol id="cw-croissant" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" d="M4 16c2-4 6-6 8-6s6 2 8 6"/><path fill="none" stroke="currentColor" stroke-width="1.5" d="M7 14c1-2 3-3 5-3s4 1 5 3"/></symbol>
        <symbol id="cw-sun" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="1.75" cx="12" cy="12" r="4"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></symbol>
        <symbol id="cw-cloud" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M7 18a4 4 0 0 1 0-8 4 4 0 0 1 7.7-1A5 5 0 0 1 17 18H7z"/></symbol>
        <symbol id="cw-rain" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M7 16a4 4 0 0 1 0-8 4 4 0 0 1 7.7-1A5 5 0 0 1 17 16"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="M8 20v2M12 18v4M16 20v2"/></symbol>
        <symbol id="cw-snow" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M7 15a4 4 0 0 1 0-8 4 4 0 0 1 7.7-1A5 5 0 0 1 17 15"/><path fill="none" stroke="currentColor" stroke-width="1.5" d="M10 19l2-2 2 2M12 17v4"/></symbol>
        <symbol id="cw-wind" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" d="M3 8h10a3 3 0 1 0-3-3M5 12h12a3 3 0 1 1-3 3M7 16h8"/></symbol>
        <symbol id="cw-partly" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M7 19a4 4 0 0 1 0-8h.5"/><circle fill="none" stroke="currentColor" stroke-width="1.5" cx="16" cy="8" r="3"/><path fill="none" stroke="currentColor" stroke-width="1.5" d="M16 3v1M19.5 8H21M16 13v1M12.5 8H11"/></symbol>
        <symbol id="cw-tag" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M3 5h6l11 11-4 4L3 9V5z"/><circle fill="currentColor" cx="7.5" cy="8.5" r="1"/></symbol>
        <symbol id="cw-clock" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="1.75" cx="12" cy="12" r="9"/><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" d="M12 7v5l3 3"/></symbol>
        <symbol id="cw-search" viewBox="0 0 24 24"><circle fill="none" stroke="currentColor" stroke-width="1.75" cx="11" cy="11" r="7"/><path fill="none" stroke="currentColor" stroke-width="1.75" d="m21 21-4.3-4.3"/></symbol>
        <symbol id="cw-camera" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="1.75" d="M4 9h3l2-2h6l2 2h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2z"/><circle fill="none" stroke="currentColor" stroke-width="1.75" cx="12" cy="14" r="3"/></symbol>
    </svg>
    <div id="container"></div>

    <button
        type="button"
        id="backHomeFab"
        class="back-home-fab"
        data-target-home="../../"
        aria-label="返回主页"
        title="返回主页">
        返回主页
    </button>

    <!-- 分步骤加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-card">
            <div class="loading-title">规划路线中</div>
            <div class="loading-steps">
                <div class="loading-step" id="step1">
                    <span class="step-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-map"/></svg></span>
                    <span class="step-text">算路</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step2">
                    <span class="step-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-coffee"/></svg></span>
                    <span class="step-text">沿途兴趣点</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step3">
                    <span class="step-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-walk"/></svg></span>
                    <span class="step-text">排序</span>
                    <span class="step-status"></span>
                </div>
                <div class="loading-step" id="step4">
                    <span class="step-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-sparkle"/></svg></span>
                    <span class="step-text">汇总</span>
                    <span class="step-status"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="control-panel">
        <div class="panel-header">
            <h2>
                <span class="panel-header-walk-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-walk"/></svg></span>
                <span class="panel-header-title-text">Citywalk</span>
            </h2>
        </div>
        <div class="panel-body">
            <!-- 城市选择器 -->
            <div class="city-selector" style="margin-bottom: 16px; background: linear-gradient(135deg, var(--primary-light), var(--primary)); padding: 12px; border-radius: 0;">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                    <span class="cw-inline-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-pin"/></svg></span>
                    <span style="font-weight: 600; color: white; font-size: 14px;">当前城市</span>
                    <span id="currentCity" style="font-weight: 700; color: white; font-size: 16px;">定位中...</span>
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                    <input type="text" id="cityInput" placeholder="输入城市名切换（如：北京、香港）" style="flex: 1; padding: 8px 12px; border: none; border-radius: 0; font-size: 13px;" onkeypress="if(event.key==='Enter')switchCity()">
                    <button onclick="switchCity()" style="padding: 8px 16px; background: white; color: var(--primary); border: none; border-radius: 0; font-weight: 600; cursor: pointer; font-size: 13px;">切换</button>
                </div>
                <div style="margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;">
                    <span style="font-size: 11px; color: rgba(255,255,255,0.9);">热门：</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('北京')">北京</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('上海')">上海</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('广州')">广州</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('深圳')">深圳</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('成都')">成都</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('杭州')">杭州</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('香港')">香港</span>
                    <span class="hot-city-tag" onclick="quickSwitchCity('澳门')">澳门</span>
                </div>
            </div>

            <!-- 搜索框 -->
            <div class="search-box" style="margin-bottom: 16px;">
                <input type="text" id="searchInput" placeholder="搜索地址（输入后回车定位）" style="width: 100%; padding: 12px 16px; border: 2px solid var(--border-light); border-radius: 0; font-size: 14px; transition: all 0.3s;">
            </div>

            <!-- 天气卡片 -->
            <div class="weather-card" id="weatherCard" style="cursor: pointer;" title="点击刷新天气">
                <div class="weather-icon" id="weatherIcon" aria-hidden="true"></div>
                <div class="weather-info">
                    <div class="title" id="weatherTitle">加载中...</div>
                    <div class="desc" id="weatherDesc">天气加载中</div>
                </div>
            </div>

            <!-- 起终点状态 -->
            <div class="status-group">
                <div class="status-card" id="startCard">
                    <div class="label status-label-row"><span class="cw-inline-ico cw-inline-ico--muted" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-pin"/></svg></span>起点</div>
                    <div class="value" id="startValue">点击地图选择</div>
                </div>
                <div class="status-card" id="endCard">
                    <div class="label status-label-row"><span class="cw-inline-ico cw-inline-ico--muted" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-flag"/></svg></span>终点</div>
                    <div class="value" id="endValue">点击地图选择</div>
                </div>
            </div>

            <!-- 使用提示 -->
            <div class="tips-box" style="background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border-radius: 0; padding: 12px; margin-bottom: 16px; font-size: 12px; color: #0369a1;">
                <strong>提示：</strong>地图点选起终点，或上方搜索地址。
            </div>

            <!-- 筛选条件 -->
            <div class="filter-group">
                <div class="filter-title">路线偏好</div>
                <div class="poi-type-group">
                    <div class="poi-type-btn active" data-type="无偏好">无偏好</div>
                    <div class="poi-type-btn" data-type="自然"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-tree"/></svg></span>自然</div>
                    <div class="poi-type-btn" data-type="历史"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-column"/></svg></span>历史</div>
                    <div class="poi-type-btn" data-type="文创"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-sparkle"/></svg></span>文创</div>
                    <div class="poi-type-btn" data-type="花店"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-flower"/></svg></span>花店</div>
                    <div class="poi-type-btn" data-type="咖啡"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-coffee"/></svg></span>咖啡</div>
                    <div class="poi-type-btn" data-type="甜品"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-cake"/></svg></span>甜品</div>
                    <div class="poi-type-btn" data-type="烘焙"><span class="poi-type-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-croissant"/></svg></span>烘焙</div>
                </div>

                <div class="filter-title">计划时长</div>
                <div class="time-slider-group" style="padding: 8px 0;">
                    <input type="range" id="planTimeSlider" min="30" max="180" value="60" style="width: 100%; accent-color: var(--primary);">
                    <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); margin-top: 4px;">
                        <span>30分钟</span>
                        <span id="planTimeValue" style="font-weight: 600; color: var(--primary);">60 分钟</span>
                        <span>3小时</span>
                    </div>
                </div>
            </div>

            <!-- 功能按钮 -->
            <div class="btn-group">
                <button class="btn btn-reset" onclick="resetSelection()">重置</button>
                <button class="btn btn-plan" id="btnPlan" onclick="generateRoute()" disabled>先选起终点</button>
            </div>

            <button class="btn-generate-plan" id="btnGeneratePlan" onclick="generatePlanText()">生成文字方案</button>

            <!-- 新增：生成分享图片按钮 -->
            <button class="btn-generate-plan" id="btnShareImage" onclick="generateShareImage()" style="margin-top: 12px; background: var(--gradient-theme); color: var(--color-theme-ink); display: none;">
                <span class="btn-share-ico" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" focusable="false"><use href="#cw-camera"/></svg></span>
                导出分享图
            </button>

            <!-- 结果展示 -->
            <div class="result-area" id="resultArea">
                <div class="result-header">路线已生成</div>
                <div class="result-item">
                    <div class="label">总距离</div>
                    <div class="value highlight" id="distanceValue">--</div>
                </div>
                <div class="result-item">
                    <div class="label">预计耗时</div>
                    <div class="value highlight" id="durationValue">--</div>
                </div>
                <div class="result-item">
                    <div class="label">打卡点</div>
                    <div class="value highlight" id="poiCountValue">0个</div>
                </div>
                <div class="poi-list" id="poiList"></div>
            </div>
        </div>
    </div>

    <script>
        (function initFileModeNavFallback() {
            const isFileMode = window.location.protocol === "file:";
            const backHomeFab = document.getElementById("backHomeFab");
            if (!backHomeFab) return;

            backHomeFab.addEventListener("click", function () {
                if (!isFileMode) {
                    const target = backHomeFab.getAttribute("data-target-home");
                    if (target) window.location.href = target;
                    return;
                }
                if (window.history.length > 1) {
                    window.history.back();
                    return;
                }
                backHomeFab.style.display = "none";
                if (window.showToast) {
                    window.showToast("独立文件模式下无可返回页面", "info", 2500);
                }
            });
        })();
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
