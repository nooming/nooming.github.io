<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFFA00">
    <meta name="description" content="中国象棋：双人或本地 AI。">
    <meta name="keywords" content="中国象棋,象棋,在线游戏,双人对战">
    <meta name="author" content="nooming">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="../../../assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../assets/icons/favicon-16x16.png">
    <link rel="manifest" href="../../../assets/icons/site.webmanifest">
    <link rel="shortcut icon" href="../../../assets/icons/favicon.ico">

    <!-- 公共样式 -->
    <link rel="stylesheet" href="../../../assets/css/common.css">
    
    <!-- 游戏样式 -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="page-container">
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="header-top">
            <a href="../" class="back-btn">返回上一级</a>
        </div>
        <div class="section-header section-header--page">
            <h1>中国象棋</h1>
            <p>双人或 AI；悔棋与规则提示。<a href="../" class="home-hub-link">小游戏</a></p>
        </div>
    </div>

    <div class="game-container">
        <div class="game-info">
            <div class="game-controls">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="two">双人对战</button>
                    <button class="mode-btn" data-mode="ai">单人模式</button>
                </div>
                <div>
                    <button class="undo-btn" id="undoBtn" onclick="undoMove()" disabled>悔棋</button>
                    <button class="reset-btn" onclick="resetGame()">新局</button>
                </div>
            </div>
            <div class="difficulty-selector" id="difficultySelector">
                <div class="difficulty-label">难度</div>
                <div class="difficulty-buttons">
                    <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                    <button class="difficulty-btn" data-difficulty="medium">中等</button>
                    <button class="difficulty-btn" data-difficulty="hard">困难</button>
                </div>
            </div>
            <div class="status" id="status">红方先行</div>
        </div>

        <div class="board-container">
            <canvas id="board" width="450" height="500"></canvas>
        </div>
    </div>

    <!-- xiangqi.js 游戏逻辑库 -->
    <script src="assets/lib/xiangqi.min.js"></script>
    <!-- 游戏逻辑 -->
    <script src="assets/js/game.js"></script>
    <script src="../../../assets/js/utils.js" defer></script>
</body>
</html>
