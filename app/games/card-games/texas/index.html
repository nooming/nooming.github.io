<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>德州扑克</title>
        <meta name="description" content="与本地 AI 进行德州扑克对局，内含规则教程。">
        <link rel="canonical" href="https://nooming.github.io/app/games/card-games/texas/">
        <meta property="og:type" content="website">
        <meta property="og:title" content="德州扑克 - 桌游">
        <meta property="og:description" content="本地 AI 德州扑克，含规则教程。">
        <meta property="og:url" content="https://nooming.github.io/app/games/card-games/texas/">
        <link rel="apple-touch-icon" sizes="180x180" href="../../../../assets/icons/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="../../../../assets/icons/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="../../../../assets/icons/favicon-16x16.png">

        <link rel="shortcut icon" href="../../../../assets/icons/favicon.ico">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="../../../../assets/css/common.css">
        <script src="https://cdn.jsdelivr.net/npm/jquery@1.12.4/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css">
        <script src="https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js"></script>
        <link rel="stylesheet" href="../assets/game-layout.css">

        <script src="../assets/common/ui-buttons.js"></script>
        <script src="../assets/common/tutorial-shell.js"></script>
        <script src="../assets/tutor-texas.js"></script>
        <script src="../assets/texas.js"></script>
        <script>
            const AI_ONLY_MODE = true
            $(() => {
                initAIMode()
            })
            let cur = { num: 0, plist: [], cards: {} }, tt = 0
            // 0 没开始 1 Pre-Flop 2 Flop 3 Turn 4 River
            // spade diamond club heard
            function drawCard(x, y, card, rot = 0, flipped = 0, isTransparent = 1) {
                let col = card[0], num = card[1]
                if (num == 'X') num = '10'
                let colMap = { 'C': 'club', 'D': 'diamond', 'H': 'heart', 'S': 'spade' }
                let colColMap = { 'C': '#333', 'D': 'red', 'H': 'red', 'S': '#333' }
                let str = ''
                if (flipped && cur.isIngame[cur.you]) str = `<rect x="${x - 10}" y="${y - 25}" transform="rotate(${rot},250,250)" width="35" height="50" rx="5" fill="#ddd" stroke="#333" stroke-width="1.5"></rect>`
                else str = `<rect x="${x - 10}" y="${y - 25}" transform="rotate(${rot},250,250)" width="35" height="50" rx="5" fill="${isTransparent ? 'transparent' : 'white'}" stroke="#333" stroke-width="1.5" ${flipped ? 'opacity="0.5"' : ''}></rect>
                    <use x="${x - 4}" y="${y - 8}" transform="rotate(${rot},250,250)" href="#${colMap[col]}" ${flipped ? 'opacity="0.5"' : ''}/>
                    <text x="${x - 7}" y="${y - 8}" transform="rotate(${rot},250,250)" font-size="16" fill="${colColMap[col]}" ${flipped ? 'opacity="0.5"' : ''}>${num}</text>`
                return str
            }
            function prec(num) {
                num = parseFloat(num)
                return parseInt(num) == num ? num : num.toFixed(1)
            }
            function drawCards() {
                let str = '', cards = cur.cards, plist = cur.plist, nnum = cur.num, num = cur.plist.length
                if (tt) {
                    str += drawCard(202.5, 275, cards.n[0], 0, tt < 2)
                    str += drawCard(242.5, 275, cards.n[1], 0, tt < 2)
                    str += drawCard(282.5, 275, cards.n[2], 0, tt < 2)
                    str += drawCard(222.5, 220, cards.n[3], 0, tt < 3)
                    str += drawCard(262.5, 220, cards.n[4], 0, tt < 4)
                    let offset = 0, sumIn = 0, winCnt = 0, winningType = 0
                    for (let i = 0; i < num; i++) {
                        if (!cur.winner || !cur.type[plist[i]]) break
                        if (!cur.winner[plist[i]]) sumIn += cur.in[plist[i]]
                        else winCnt++
                        winningType = cur.type[plist[i]][0]
                    }
                    for (let i = 0; i < num; i++) {
                        offset = i
                        if (plist[i] == cur.you) break
                    }
                    for (let gi = 0; gi < num; gi++) {
                        let i = (gi + offset) % num
                        console.log(i)
                        let k = cards.p[plist[i]]
                        console.log(k)
                        if (plist[i] != cur.you) {
                            str += drawCard(222.5, 470, k[0], 360 * gi / num, tt < 5)
                            str += drawCard(262.5, 470, k[1], 360 * gi / num, tt < 5)
                        } else {
                            str += drawCard(222.5, 470, k[0])
                            str += drawCard(262.5, 470, k[1])
                        }
                        if (cur.wasReady == plist[i]) str += `<text class="person-ready" x="250" y="440" transform="rotate(${360 * gi / num},250,250)" text-anchor="middle">${cur.name[plist[i]]}</text>`
                        str += `<text ${cur.wasReady == plist[i] ? 'class="person-unready" style="display:none"' : ''} x="250" y="440" transform="rotate(${360 * gi / num},250,250)" text-anchor="middle">${cur.name[plist[i]]}</text>`
                        if (cur.st < 5) str += `<circle cx="${cur.name[plist[i]].length * 8 + 258}" cy="434" r="5" ${plist[i] == cur.now ? 'class="blink"' : 'fill="transparent"'} transform="rotate(${360 * gi / num},250,250)"></circle>`
                        else str += `<circle cx="${cur.name[plist[i]].length * 8 + 258}" cy="434" r="5" fill="${cur.isReady[plist[i]] ? '#333' : '#ddd'}" transform="rotate(${360 * gi / num},250,250)"></circle>`
                        str += `<text x="250" y="420" transform="rotate(${360 * gi / num},250,250)" text-anchor="middle" fill="${cur.cash[plist[i]] ? '#999' : 'red'}">◉${prec(cur.cash[plist[i]])}</text>`
                        if (cur.in[plist[i]]) {
                            // str += `<text x="230" y="370" transform="rotate(${360 * gi / num},250,250) rotate(90,230,370)" text-anchor="middle" fill="${cur.winner[plist[i]] ? '#333' : (cur.type[plist[i]][0] > winningType ? 'red' : '#ddd')}">${['高牌', '一对', '两对', '三条', '顺子', '同花', '葫芦', '四条', '同花顺', '皇家同花顺'][cur.type[plist[i]][0]]}</text>`
                            if (tt == 5) str += `<text x="260" y="370" transform="rotate(${360 * gi / num},250,250) rotate(90,260,370)" text-anchor="middle" fill="#${cur.winner[plist[i]] ? '333' : 'ddd'}">◉${prec(cur.winner[plist[i]] ? cur.won[plist[i]] : cur.in[plist[i]])}</text>`
                            else str += `<text class="in-${plist[i]}" x="260" y="370" transform="rotate(${360 * gi / num},250,250) rotate(90,260,370)" text-anchor="middle" fill="${cur.givenup[plist[i]] ? 'red' : `#${plist[i] == cur.now ? '333' : 'ddd'}`}">◉${prec(cur.in[plist[i]])}</text>`
                        } else {
                            str += `<text class="in-${plist[i]}" x="260" y="370" transform="rotate(${360 * gi / num},250,250) rotate(90,260,370)" text-anchor="middle" fill="${cur.givenup[plist[i]] ? 'red' : `#${plist[i] == cur.now ? '333' : 'ddd'}`}"></text>`
                        }
                        if (tt == 5) {
                            str += `<text x="230" y="370" transform="rotate(${360 * gi / num},250,250) rotate(90,230,370)" text-anchor="middle" fill="#${cur.winner[plist[i]] ? '333' : 'ddd'}">${['高牌', '一对', '两对', '三条', '顺子', '同花', '葫芦', '四条', '同花顺', '皇家同花顺', ''][cur.type[plist[i]][0]]}</text>`
                            if (cur.winner[plist[i]]) str += `<line x1="250" y1="395" x2="250" y2="345" stroke="#333" stroke-width="1.5" transform="rotate(${360 * gi / num},250,250)" marker-start="url(#arrow)"/>`
                            else str += `<line x1="250" y1="399" x2="250" y2="340" stroke="#ddd" stroke-width="1.5" transform="rotate(${360 * gi / num},250,250)" marker-end="url(#arrow-grey)"/>`
                        } else {
                            str += `<line class="line-${plist[i]}" x1="250" y1="399" x2="250" y2="340" stroke="${cur.givenup[plist[i]] ? 'red' : `#${plist[i] == cur.now ? '333' : 'ddd'}`}" stroke-width="1.5" transform="rotate(${360 * gi / num},250,250)" ${cur.givenup[plist[i]] ? 'marker-end="url(#gaveup)"' : `marker-end="url(#arrow${plist[i] == cur.now ? '' : '-grey'})"`}/>`
                            str += `<line style="display:none" class="line-${plist[i]}-blue" x1="250" y1="399" x2="250" y2="340" stroke="#337ab7" stroke-width="1.5" transform="rotate(${360 * gi / num},250,250)" marker-end="url(#arrow-blue)"/>`
                            str += `<line style="display:none" class="line-${plist[i]}-red" x1="250" y1="399" x2="250" y2="340" stroke="#d9534f" stroke-width="1.5" transform="rotate(${360 * gi / num},250,250)" marker-end="url(#arrow-red)"/>`
                        }
                    }
                } else {
                    for (let i = 0; i < num; i++) {
                        offset = i
                        if (plist[i] == cur.you) break
                    }
                    for (let gi = 0; gi < num; gi++) {
                        let i = (gi + offset) % num
                        str += drawCard(262.5, 470, 'C7', 360 * i / num, 1)
                        str += drawCard(222.5, 470, 'CK', 360 * i / num, 1)
                        if (cur.wasReady == plist[i]) str += `<text class="person-ready" x="250" y="440" transform="rotate(${360 * gi / num},250,250)" text-anchor="middle" font-weight="bold">${cur.name[plist[i]]}</text>`
                        console.log(cur.isReady[plist[i]])
                        str += `<text ${cur.wasReady == plist[i] ? 'class="person-unready" style="display:none"' : ''} x="250" y="440" fill="${cur.isOffline[plist[i]] ? '#bbb' : '#333'}" transform="rotate(${360 * gi / num},250,250)" text-anchor="middle">${cur.name[plist[i]]}</text>`
                        str += `<circle cx="${cur.name[plist[i]].length * 8 + 258}" cy="434" r="5" fill="${cur.isReady[plist[i]] ? '#333' : '#ddd'}" transform="rotate(${360 * gi / num},250,250)"></circle>`
                    }
                }
                return str
            }
            function drawPeople() {
                let str = '', isIngame = cur.isIngame, num = cur.plist.length
                if (tt) {
                    for (let i in isIngame) {
                        console.log(i, isIngame[i])
                        if (!isIngame[i]) str += `<text x="250" y="440" transform="rotate(${360 * i * 1.3 / num},250,250)" text-anchor="middle" fill="#bbb">${cur.name[i]}</text>`
                    }
                }
                return str
            }
            function drawTable(add = '') {
                let str = `<defs>
                <marker id="arrow" fill="#333" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" /></marker>
                <marker id="gaveup" fill="red" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 10 0 L 0 5 L 10 10 z" /></marker>
                <marker id="arrow-grey" fill="#ddd" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" /></marker>
                <marker id="arrow-blue" fill="#337ab7" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" /></marker>
                <marker id="arrow-red" fill="#d9534f" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" /></marker>
                <path id="heart" fill="red" d="m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z"/>
                <path id="spade" fill="#333" d="M12 2C9 7 4 9 4 14c0 2 2 4 4 4c1 0 2 0 3-1c0 0 .32 2-2 5h6c-2-3-2-5-2-5c1 1 2 1 3 1c2 0 4-2 4-4c0-5-5-7-8-12"/>
                <path id="diamond" fill="red" d="m19 12l-7 10l-7-10l7-10"/>
                <path id="club" fill="#333" d="M12 2c2.3 0 4.3 2 4.3 4.2a4.45 4.45 0 0 1-2.26 3.8c1-.5 2.46-.5 2.46-.5c2.5 0 4.5 1.8 4.5 4.3S19 18 16.5 18c0 0-1.5 0-3.5-1c0 0-.3 2 2 5H9c2.3-3 2-5 2-5c-2 1-3.5 1-3.5 1C5 18 3 16.3 3 13.8s2-4.3 4.5-4.3c0 0 1.46 0 2.46.5c-.3-.17-2.17-1.23-2.26-3.8C7.7 4 9.7 2 12 2"/>
                <path id="chip" fill="#333" d="M128 24a104 104 0 1 0 104 104A104.11 104.11 0 0 0 128 24M60.4 71.72l17.07 17.07a63.66 63.66 0 0 0-13 31.21h-24.1A87.6 87.6 0 0 1 60.4 71.72M40.37 136h24.15a63.66 63.66 0 0 0 13 31.21L60.4 184.28A87.6 87.6 0 0 1 40.37 136M120 215.63a87.6 87.6 0 0 1-48.28-20l17.07-17.07A63.66 63.66 0 0 0 120 191.48Zm0-151.11a63.66 63.66 0 0 0-31.21 13L71.72 60.4a87.6 87.6 0 0 1 48.28-20ZM215.63 120h-24.15a63.66 63.66 0 0 0-12.95-31.21l17.07-17.07A87.6 87.6 0 0 1 215.63 120M136 40.37a87.6 87.6 0 0 1 48.28 20l-17.07 17.1a63.66 63.66 0 0 0-31.21-13Zm0 175.26v-24.15a63.66 63.66 0 0 0 31.21-12.95l17.07 17.07A87.6 87.6 0 0 1 136 215.63m59.6-31.35l-17.07-17.07A63.66 63.66 0 0 0 191.48 136h24.15a87.6 87.6 0 0 1-20.03 48.28"/>
                </defs>
                <circle cx="250" cy="250" r="150" stroke="#333" stroke-width="1.5" fill="transparent"></circle>`
                str += drawCards()
                str += drawPeople()
                str += add
                $('.texas-svg').html(str)
                setTimeout(() => {
                    $('.btn-ready').removeClass('btn-danger')
                    $('.person-ready').remove()
                    $('.person-unready').css('display', 'block')
                }, 100)
                // $('.texas-svg-down').html(str)
            }
            function getButton(type, text, onclick, glyph = 0, onmouseenter = 0, onmouseleave = 0, onmousedown = 0, glyph2 = 0) {
                return `<button class="btn btn-${type}" onclick="${onclick}" ${onmouseenter ? `onmouseenter="${onmouseenter}" ontouchstart="${onmouseenter}"` : ''} ${onmouseleave ? `onmouseleave="${onmouseleave}"` : ''} ${onmousedown ? `onmousedown="${onmousedown}"` : ''}>${glyph ? `<span class="glyphicon glyphicon-${glyph}"></span> ` : ''}${text}${glyph2 ? ` <span class="glyphicon glyphicon-${glyph2}"></span>` : ''}</button>`
            }
            function getAddButtons(up, me, max) {
                if (!me) me = 0
                up = parseInt(up)
                let str = getButton('primary', `加注 ${up + 5}`, `socket.send('up ${up - me + 5}')`, 'arrow-up', `socket.send('hover up ${up + 5}')`)
                if (up + 5 - me >= cur.cash[cur.you]) str = ''
                let arr = [10, 15, 20, 30, 50, 70, 90, 190, 490]
                for (let i = 0; i < arr.length; i++) {
                    if (up + arr[i] - me >= cur.cash[cur.you]) {
                        str += getButton('primary', `全押`, `socket.send('up ${cur.cash[cur.you]}')`, 'fire', `socket.send('hover up ${cur.cash[cur.you] + me}')`)
                        break
                    }
                    str += getButton('primary btn-up', up + arr[i], `socket.send('up ${up - me + arr[i]}')`, 0, `socket.send('hover up ${up + arr[i]}')`)
                }
                return str
            }
            function drawButtons(msg = '') {
                let str = '', str2 = msg
                if (cur.cash[cur.you] <= cur.bb && tt) {
                    if (tt < 5) {
                        if (!cur.cash[cur.you]) str2 += `你最多赢回 ◉${prec(2 * cur.in[cur.you])}。<br><br>`
                    } else str2 += `下局将发放 ◉${Math.max(cur.bb, cur.initCash / 10) - cur.cash[cur.you]} 救济金。<br><br>`
                }
                if (tt == 0) {
                    let f = ''
                    for (let i in cur.isOffline) if (cur.isOffline[i]) f += (f.length ? '、' : '') + (cur.name[i] == '' ? '玩家' : cur.name[i])
                    if (f.length) {
                        str += `<div style="text-align:center;margin-top:-50px;line-height:1.5lh;margin-bottom:10px;margin-left:${(cur.num > 1 && f.length < 5) ? -20 : 25 - 8 * f.length}px">${f}掉线了。<br>可稍等${cur.num > 1 ? '，或者' : '。'}</div>`
                        if (cur.num > 1) str += `${getButton(`default ${cur.wasReady != -1 ? 'btn-danger' : ''} btn-ready`, '下一局', 0, 'play', 0, 0, `socket.send('ready')`)} ${cur.readyCnt} / ${cur.num}`
                    } else if (cur.num > 1) str += `${getButton(`default ${cur.wasReady != -1 ? 'btn-danger' : ''} btn-ready`, '启动', 0, 'play', 0, 0, `socket.send('ready')`)} ${cur.readyCnt} / ${cur.num}`
                } else if (cur.num > 1) {
                    if (tt < 5 && cur.now == cur.you) {
                        if (tt == 1 && cur.dstep == 1) str2 += `${getButton('primary', `小盲 ${cur.bb / 2}`, `socket.send('up ${cur.bb / 2}')`, 'arrow-up', `socket.send('hover up ${cur.bb / 2}')`, `socket.send('hover nothing')`)}`
                        else if (tt == 1 && cur.dstep == 2) str2 += `${getButton('primary', `大盲 ${cur.bb}`, `socket.send('up ${cur.bb}')`, 'arrow-up', `socket.send('hover up ${cur.bb}')`, `socket.send('hover nothing')`)}`
                        else if (!cur.cash[cur.you]) str2 += `${getButton('default', `过`, `socket.send('follow')`, 'arrow-right', `socket.send('hover follow ${cur.in[cur.you]}')`)}`
                        else if (!cur.dstepped) str2 += `<div class="btn-group" onmouseleave="socket.send('hover nothing')">${getButton('default', `过`, `socket.send('follow')`, 'arrow-right', `socket.send('hover follow ${cur.up}')`)}${getAddButtons(cur.up, cur.in[cur.you])}</div>`
                        else str2 += `<div class="btn-group" onmouseleave="socket.send('hover nothing')">${getButton('danger', `放弃`, `socket.send('nope')`, 'remove', `socket.send('hover nope')`)}${cur.up - cur.in[cur.you] >= cur.cash[cur.you] ? '' : getButton('default', `跟注 ${prec(cur.up)}`, `socket.send('follow')`, 'arrow-right', `socket.send('hover follow ${cur.up}')`)}${getAddButtons(cur.up, cur.in[cur.you])}</div>`
                    } else if (tt == 5) {
                        str2 += `${getButton(`default ${cur.wasReady != -1 ? 'btn-danger' : ''} btn-ready`, '下一局', 0, 'play', 0, 0, `socket.send('ready')`)} ${cur.readyCnt} / ${cur.num}`
                    }
                }
                $('.texas-btns').html(str)
                $('.texas-btns-down').html(str2)
            }
            function procHover(k, id) {
                if (k[0] == 'up') {
                    $(`.line-${id},.line-${id}-red`).hide()
                    $(`.line-${id}-blue`).show()
                    $(`.in-${id}`).attr('fill', '#337ab7').text(`◉${prec(k[1])}`)
                } else if (k[0] == 'nope') {
                    $(`.line-${id},.line-${id}-blue`).hide()
                    $(`.line-${id}-red`).show()
                    $(`.in-${id}`).attr('fill', '#d9534f').text(cur.in[id] ? `◉${prec(cur.in[id])}` : '')
                } else if (k[0] == 'follow') {
                    $(`.line-${id}-red,.line-${id}-blue`).hide()
                    $(`.line-${id}`).show()
                    $(`.in-${id}`).attr('fill', '#333').text(`◉${prec(k[1])}`)
                }
            }
            let socket = null
            function listTables() {
                let str = '', ar = '', arr = drawTexasAll()
                str += `<defs><path id="heart" fill="red" d="m12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5C2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53z"/>
                <path id="spade" fill="#333" d="M12 2C9 7 4 9 4 14c0 2 2 4 4 4c1 0 2 0 3-1c0 0 .32 2-2 5h6c-2-3-2-5-2-5c1 1 2 1 3 1c2 0 4-2 4-4c0-5-5-7-8-12"/>
                <path id="diamond" fill="red" d="m19 12l-7 10l-7-10l7-10"/>
                <path id="club" fill="#333" d="M12 2c2.3 0 4.3 2 4.3 4.2a4.45 4.45 0 0 1-2.26 3.8c1-.5 2.46-.5 2.46-.5c2.5 0 4.5 1.8 4.5 4.3S19 18 16.5 18c0 0-1.5 0-3.5-1c0 0-.3 2 2 5H9c2.3-3 2-5 2-5c-2 1-3.5 1-3.5 1C5 18 3 16.3 3 13.8s2-4.3 4.5-4.3c0 0 1.46 0 2.46.5c-.3-.17-2.17-1.23-2.26-3.8C7.7 4 9.7 2 12 2"/></defs>`
                for (let i = 0; i < 7; i++) {
                    let x = Math.random(), y = Math.random()
                    x = 1.5 * x - 0.5 * x * x
                    y = 1.5 * y - 0.5 * y * y
                    ar = arr[Math.floor(Math.random() * arr.length)], str += drawCard(x * 400 + 50, y * 350 + 80, ar, Math.random() * 40 - 20, 0, 0)
                }
                $('.decor').html(str)
            }
            function drawTexasAll() {
                let col = 'CDHS', num = '23456789XJQKA', s = []
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 13; j++) {
                        s.push(col[i] + num[j])
                    }
                }
                return s
            }
            function initAIMode() {
                $('.list-table').html('<li class="text-muted" style="cursor:default;">AI 对战模式已启用，点击下方开始。</li>')
                let str = '', ar = '', arr = drawTexasAll()

                <path id="spade" fill="#333" d="M12 2C9 7 4 9 4 14c0 2 2 4 4 4c1 0 2 0 3-1c0 0 .32 2-2 5h6c-2-3-2-5-2-5c1 1 2 1 3 1c2 0 4-2 4-4c0-5-5-7-8-12"/>
                <path id="diamond" fill="red" d="m19 12l-7 10l-7-10l7-10"/>
                <path id="club" fill="#333" d="M12 2c2.3 0 4.3 2 4.3 4.2a4.45 4.45 0 0 1-2.26 3.8c1-.5 2.46-.5 2.46-.5c2.5 0 4.5 1.8 4.5 4.3S19 18 16.5 18c0 0-1.5 0-3.5-1c0 0-.3 2 2 5H9c2.3-3 2-5 2-5c-2 1-3.5 1-3.5 1C5 18 3 16.3 3 13.8s2-4.3 4.5-4.3c0 0 1.46 0 2.46.5c-.3-.17-2.17-1.23-2.26-3.8C7.7 4 9.7 2 12 2"/></defs>`
                for (let i = 0; i < 7; i++) {
                    let x = Math.random(), y = Math.random()
                    x = 1.5 * x - 0.5 * x * x
                    y = 1.5 * y - 0.5 * y * y
