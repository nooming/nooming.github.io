<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="用手机摄像头对准风扇转轴邻域，根据梯度极向质心角随时间变化估算转速（RPM）。需授权摄像头，建议在 HTTPS 或本地环境使用。" />
  <meta name="keywords" content="角向跟踪,极向质心,风扇转速,RPM,摄像头" />
  <meta name="theme-color" content="#0a0e14" />
  <title>角向跟踪测转速 - 实用工具</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    .fan-rpm-shell {
      --bg: #0a0e14;
      --surface: #121820;
      --text: #e8edf4;
      --muted: #7d8a9a;
      --accent: #3dd6c6;
      --accent-dim: rgba(61, 214, 198, 0.15);
      --danger: #ff6b6b;
      --radius: 14px;
      --font: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      box-sizing: border-box;
      max-width: 520px;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      -webkit-tap-highlight-color: transparent;
    }
    .fan-rpm-shell * { box-sizing: border-box; }
    .fan-rpm-shell .sub {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 16px;
    }
    .fan-rpm-shell .stage {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    /* 仅裁剪画面圆角，说明文字在下方单独一行，避免 overflow:hidden 裁掉 ::after */
    .fan-rpm-shell .stage-viewport {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: var(--radius);
      background: #000;
    }
    .fan-rpm-shell .stage-caption {
      margin: 10px 4px 0;
      padding-bottom: 2px;
      text-align: center;
      font-size: 11px;
      line-height: 1.45;
      color: var(--accent);
      text-shadow: 0 1px 2px #000;
      word-break: break-word;
    }
    .fan-rpm-shell video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .fan-rpm-shell canvas { display: none; }
    .fan-rpm-shell .ref-tap-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      cursor: crosshair;
      touch-action: none;
    }
    .fan-rpm-shell .ref-tap-layer.active {
      display: block;
    }
    .fan-rpm-shell .ref-marker {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 22px;
      margin-left: 0;
      margin-top: 0;
    }
    .fan-rpm-shell .ref-marker::before,
    .fan-rpm-shell .ref-marker::after {
      content: "";
      position: absolute;
      background: var(--accent);
      box-shadow: 0 0 4px #000;
    }
    .fan-rpm-shell .ref-marker::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }
    .fan-rpm-shell .ref-marker::after {
      top: 50%;
      left: 0;
      height: 2px;
      width: 100%;
      transform: translateY(-50%);
    }
    .fan-rpm-shell .ref-patch-ring {
      position: absolute;
      border: 1px solid rgba(61, 214, 198, 0.75);
      border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35) inset;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .fan-rpm-shell .panel {
      margin-top: 18px;
      padding: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .fan-rpm-shell .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .fan-rpm-shell .row:last-child { margin-bottom: 0; }
    .fan-rpm-shell label { font-size: 0.9rem; color: var(--muted); }
    .fan-rpm-shell input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .fan-rpm-shell .value {
      min-width: 2.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--accent);
    }
    .fan-rpm-shell .readout {
      text-align: center;
      padding: 20px 12px;
      background: var(--accent-dim);
      border-radius: var(--radius);
      margin-bottom: 14px;
    }
    .fan-rpm-shell .readout .rpm-num {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .fan-rpm-shell .readout .unit { font-size: 1rem; font-weight: 500; color: var(--muted); margin-left: 4px; }
    .fan-rpm-shell .readout .meta {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fan-rpm-shell .btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(145deg, #2ebfaf, var(--accent));
      color: #041210;
      margin-bottom: 10px;
    }
    .fan-rpm-shell .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .fan-rpm-shell .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .fan-rpm-shell .hint {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 12px;
    }
    .fan-rpm-shell .err {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .fan-rpm-shell .status { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body class="page-container">
  <div class="page-header">
    <div class="header-top">
      <a href="../" class="back-btn">返回上一级</a>
    </div>
    <h1 class="page-title">角向跟踪测转速</h1>
  </div>

  <main class="fan-rpm-shell">
    <p class="sub">请把十字对准<strong>转轴中心</strong>（轮毂），邻域覆盖有纹理或清晰边缘的扇叶区域。本页用邻域内<strong>梯度极向质心方向角</strong>随时间变化估角速度并换算 RPM；<strong>对称多叶</strong>时读数可能与真实轴转速差整数倍，需结合叶片数、目视或标定。</p>

    <div class="stage">
      <div class="stage-viewport" id="stageViewport">
        <video id="video" playsinline muted></video>
        <div id="refPatchRing" class="ref-patch-ring" aria-hidden="true"></div>
        <div id="refMarker" class="ref-marker" aria-hidden="true"></div>
        <div id="refTapLayer" class="ref-tap-layer" aria-hidden="true"></div>
      </div>
      <p class="stage-caption" id="stageCaption">参照点邻域采样 · 点「点选参照」后在画面上点击</p>
    </div>
    <canvas id="work"></canvas>

    <div class="panel">
      <div class="readout">
        <span class="rpm-num" id="rpmDisplay">—</span><span class="unit">RPM</span>
        <div class="meta">
          叶片数 <strong id="bladeOut">3</strong> · 置信度 <strong id="confOut">—</strong>
          · 约 <strong id="hzOut">—</strong> Hz（叶尖通过频率）
        </div>
      </div>
      <div class="row">
        <label for="blades">叶片数量</label>
        <input type="range" id="blades" min="2" max="8" value="3" />
        <span class="value" id="bladeVal">3</span>
      </div>
      <div class="row">
        <label for="buffer">采样时长（秒）</label>
        <input type="range" id="buffer" min="2" max="12" value="4" step="1" />
        <span class="value" id="bufVal">4</span>
      </div>
      <div class="row">
        <label for="patchSize">邻域边长 (px)</label>
        <input type="range" id="patchSize" min="5" max="15" value="9" step="2" />
        <span class="value" id="patchVal">9</span>
      </div>
      <button type="button" class="btn secondary" id="pickRefBtn" disabled>点选参照位置</button>
      <button type="button" class="btn" id="startBtn">开启摄像头并开始</button>
      <button type="button" class="btn secondary" id="stopBtn" disabled>停止</button>
      <p class="hint">
        说明：转速上限受相机帧率限制（奈奎斯特）。每帧在参照邻域内计算<strong>解缠绕极向角</strong>，对序列做 FFT 得主频，再按叶片数换算 RPM。<strong>多叶对称</strong>时主峰可能与轴转速呈倍数关系，需结合目视。建议采样<strong>≥4 秒</strong>。
      </p>
      <p class="err" id="errBox" hidden></p>
      <p class="status" id="status"></p>
    </div>
  </main>

  <script>
(function () {
  const video = document.getElementById("video");
  const canvas = document.getElementById("work");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const bladesEl = document.getElementById("blades");
  const bufferEl = document.getElementById("buffer");
  const bladeVal = document.getElementById("bladeVal");
  const bufVal = document.getElementById("bufVal");
  const rpmDisplay = document.getElementById("rpmDisplay");
  const bladeOut = document.getElementById("bladeOut");
  const confOut = document.getElementById("confOut");
  const hzOut = document.getElementById("hzOut");
  const errBox = document.getElementById("errBox");
  const statusEl = document.getElementById("status");
  const refTapLayer = document.getElementById("refTapLayer");
  const refMarker = document.getElementById("refMarker");
  const refPatchRing = document.getElementById("refPatchRing");
  const pickRefBtn = document.getElementById("pickRefBtn");
  const patchSizeEl = document.getElementById("patchSize");
  const patchValEl = document.getElementById("patchVal");
  const stageCaption = document.getElementById("stageCaption");

  /** 参照点归一化坐标 [0,1]，未点选时用画面中心 */
  let refNx = 0.5;
  let refNy = 0.5;
  let refUserPlaced = false;
  let refPickMode = false;

  let stream = null;
  let running = false;
  let rafId = 0;
  let vfcHandle = 0;
  let lastFrameTime = 0;
  let sampleTimes = [];
  /** 极向质心方向角（解缠绕后，弧度）时间序列，参照点应对准转轴中心 */
  let samplesPolar = [];
  /** 极向角解缠绕状态 */
  let polarUnwrap = { lastRaw: null, acc: 0 };
  let measuredFps = 30;

  /** 谱峰可信度：抑制无周期噪声 */
  const MIN_SPECTRAL_CONFIDENCE = 0.28;
  const MIN_PEAK_PROMINENCE = 4.2;
  const MIN_PEAK_TO_SECOND_RATIO = 1.08;
  const MAX_SPECTRAL_FLATNESS = 0.58;
  /** 解缠绕极向角序列去均值前 RMS（弧度） */
  const MIN_RMS_POLAR = 0.012;

  function getSpectralThresholds() {
    return {
      cMin: MIN_SPECTRAL_CONFIDENCE,
      prom: MIN_PEAK_PROMINENCE,
      p2s: MIN_PEAK_TO_SECOND_RATIO,
      flat: MAX_SPECTRAL_FLATNESS,
      rmsPolar: MIN_RMS_POLAR,
    };
  }

  /** object-fit: cover 下，视频像素与元素内显示位置的映射 */
  function getCoverMapping(videoEl, vw, vh) {
    const r = videoEl.getBoundingClientRect();
    const dw = r.width;
    const dh = r.height;
    const videoRatio = vw / vh;
    const boxRatio = dw / dh;
    if (boxRatio > videoRatio) {
      const scale = dh / vh;
      const offsetX = (dw - vw * scale) / 2;
      return { scale, offsetX, offsetY: 0 };
    }
    const scale = dw / vw;
    const offsetY = (dh - vh * scale) / 2;
    return { scale, offsetX: 0, offsetY };
  }

  function clientToVideoPx(clientX, clientY, videoEl, vw, vh) {
    const r = videoEl.getBoundingClientRect();
    const relX = clientX - r.left;
    const relY = clientY - r.top;
    const m = getCoverMapping(videoEl, vw, vh);
    const px = (relX - m.offsetX) / m.scale;
    const py = (relY - m.offsetY) / m.scale;
    return {
      x: Math.max(0, Math.min(vw - 1, Math.round(px))),
      y: Math.max(0, Math.min(vh - 1, Math.round(py))),
    };
  }

  function videoPxToLayerPx(videoEl, vw, vh, px, py) {
    const m = getCoverMapping(videoEl, vw, vh);
    return {
      left: m.offsetX + px * m.scale,
      top: m.offsetY + py * m.scale,
    };
  }

  function getPatchSideOdd() {
    let ps = parseInt(patchSizeEl.value, 10) || 9;
    if (ps % 2 === 0) ps += 1;
    return Math.max(5, Math.min(15, ps));
  }

  /**
   * 邻域内梯度幅加权的极向质心方向角（相对转轴即邻域中心），[-π, π]
   */
  function computePolarGradientCentroidAngle(gray, ps) {
    const cx = (ps - 1) * 0.5;
    const cy = (ps - 1) * 0.5;
    let cr = 0;
    let si = 0;
    for (let y = 1; y < ps - 1; y++) {
      const row = y * ps;
      for (let x = 1; x < ps - 1; x++) {
        const idx = row + x;
        const gx = (gray[idx + 1] - gray[idx - 1]) * 0.5;
        const gy = (gray[idx + ps] - gray[idx - ps]) * 0.5;
        const mag = Math.hypot(gx, gy);
        const alpha = Math.atan2(y - cy, x - cx);
        cr += mag * Math.cos(alpha);
        si += mag * Math.sin(alpha);
      }
    }
    if (cr * cr + si * si < 1e-18) return 0;
    return Math.atan2(si, cr);
  }

  function unwrapPolarAngle(rawRad) {
    if (polarUnwrap.lastRaw === null) {
      polarUnwrap.lastRaw = rawRad;
      polarUnwrap.acc = rawRad;
      return polarUnwrap.acc;
    }
    let d = rawRad - polarUnwrap.lastRaw;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    polarUnwrap.acc += d;
    polarUnwrap.lastRaw = rawRad;
    return polarUnwrap.acc;
  }

  function resetPolarUnwrap() {
    polarUnwrap.lastRaw = null;
    polarUnwrap.acc = 0;
  }

  function updateRefMarkers() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh || !running) {
      refMarker.style.visibility = "hidden";
      refPatchRing.style.visibility = "hidden";
      return;
    }
    const cx = refUserPlaced ? refNx * (vw - 1) : 0.5 * (vw - 1);
    const cy = refUserPlaced ? refNy * (vh - 1) : 0.5 * (vh - 1);
    const pos = videoPxToLayerPx(video, vw, vh, cx, cy);
    refMarker.style.left = pos.left + "px";
    refMarker.style.top = pos.top + "px";
    refMarker.style.visibility = "visible";
    const ps = getPatchSideOdd();
    const m = getCoverMapping(video, vw, vh);
    const disp = ps * m.scale;
    refPatchRing.style.width = disp + "px";
    refPatchRing.style.height = disp + "px";
    refPatchRing.style.left = pos.left + "px";
    refPatchRing.style.top = pos.top + "px";
    refPatchRing.style.visibility = "visible";
  }

  function setErr(msg) {
    if (msg) {
      errBox.hidden = false;
      errBox.textContent = msg;
    } else {
      errBox.hidden = true;
    }
  }

  function nextPow2(n) {
    let p = 1;
    while (p < n) p <<= 1;
    return p;
  }

  function fftReal(input) {
    const n = input.length;
    const real = new Float64Array(input);
    const imag = new Float64Array(n);
    for (let i = 0; i < n; i++) imag[i] = 0;
    let j = 0;
    for (let i = 1; i < n; i++) {
      let bit = n >> 1;
      for (; j & bit; bit >>= 1) j ^= bit;
      j ^= bit;
      if (i < j) {
        const tr = real[i];
        real[i] = real[j];
        real[j] = tr;
      }
    }
    for (let len = 2; len <= n; len <<= 1) {
      const half = len >> 1;
      const ang = (-2 * Math.PI) / len;
      const wlenR = Math.cos(ang);
      const wlenI = Math.sin(ang);
      for (let i = 0; i < n; i += len) {
        let wr = 1;
        let wi = 0;
        for (let k = 0; k < half; k++) {
          const i0 = i + k;
          const i1 = i0 + half;
          const r0 = real[i0];
          const i0i = imag[i0];
          const r1 = real[i1];
          const i1i = imag[i1];
          const tr = wr * r1 - wi * i1i;
          const ti = wr * i1i + wi * r1;
          real[i1] = r0 - tr;
          imag[i1] = i0i - ti;
          real[i0] = r0 + tr;
          imag[i0] = i0i + ti;
          const nwr = wr * wlenR - wi * wlenI;
          wi = wr * wlenI + wi * wlenR;
          wr = nwr;
        }
      }
    }
    return { real, imag };
  }

  function magnitudeSpectrum(real, imag) {
    const n = real.length;
    const mag = new Float64Array(n / 2);
    for (let k = 0; k < n / 2; k++) {
      mag[k] = Math.hypot(real[k], imag[k]);
    }
    return mag;
  }

  /** 用帧间隔中位数估计有效帧率，比「点数/总时长」更抗偶发掉帧 */
  function effectiveFpsFromTimes(times) {
    if (times.length < 2) return measuredFps;
    const gaps = [];
    for (let i = 1; i < times.length; i++) {
      const g = times[i] - times[i - 1];
      if (g > 0 && g < 500) gaps.push(g);
    }
    if (gaps.length === 0) return measuredFps;
    gaps.sort((a, b) => a - b);
    const mid = gaps[Math.floor(gaps.length / 2)];
    return Math.min(240, Math.max(5, 1000 / mid));
  }

  /** 去线性漂移，减轻慢变对低频的干扰 */
  function detrendLinear(arr) {
    const n = arr.length;
    if (n < 4) return;
    let sx = 0;
    let sy = 0;
    let sxx = 0;
    let sxy = 0;
    for (let i = 0; i < n; i++) {
      sx += i;
      sy += arr[i];
      sxx += i * i;
      sxy += i * arr[i];
    }
    const den = n * sxx - sx * sx;
    if (Math.abs(den) < 1e-12) return;
    const slope = (n * sxy - sx * sy) / den;
    const intercept = (sy - slope * sx) / n;
    for (let i = 0; i < n; i++) arr[i] -= slope * i + intercept;
  }

  /** Hann 窗，减轻有限长序列的频谱泄漏 */
  function applyHannWindow(arr) {
    const n = arr.length;
    if (n < 2) return;
    const nm1 = n - 1;
    for (let i = 0; i < n; i++) {
      arr[i] *= 0.5 * (1 - Math.cos((2 * Math.PI * i) / nm1));
    }
  }

  /** 频域抛物线插值，得到亚 bin 的峰值频率 */
  function parabolicPeakBin(mag, k) {
    if (k <= 0 || k >= mag.length - 1) return k;
    const a = mag[k - 1];
    const b = mag[k];
    const c = mag[k + 1];
    const denom = a - 2 * b + c;
    if (Math.abs(denom) < 1e-12) return k;
    const delta = 0.5 * (a - c) / denom;
    if (delta < -0.5 || delta > 0.5) return k;
    return k + delta;
  }

  /**
   * 谐波加权：真实周期往往在 f、2f、3f 处均有能量，单纯 max(bin) 易锁到谐波或噪声峰
   */
  function pickBestKHarmonicWeighted(mag, kMin, kMax) {
    let bestK = kMin;
    let bestScore = -1;
    for (let k = kMin; k <= kMax; k++) {
      const m0 = mag[k];
      let score = m0;
      const k2 = Math.round(2 * k);
      if (k2 !== k && k2 >= kMin && k2 <= kMax) score += 0.44 * mag[k2];
      const k3 = Math.round(3 * k);
      if (k3 !== k && k3 >= kMin && k3 <= kMax) score += 0.22 * mag[k3];
      if (score > bestScore) {
        bestScore = score;
        bestK = k;
      }
    }
    return { bestK, bestScore };
  }

  /** 对解缠绕极向角时间序列（弧度）做 FFT 与峰解释 */
  function analyzeSeries(values, bladeCount) {
    if (values.length < 64) return null;
    const st = getSpectralThresholds();

    const raw = new Float64Array(values);
    let mean = 0;
    for (let i = 0; i < raw.length; i++) mean += raw[i];
    mean /= raw.length;
    for (let i = 0; i < raw.length; i++) raw[i] -= mean;

    let rmsPre = 0;
    for (let i = 0; i < raw.length; i++) rmsPre += raw[i] * raw[i];
    rmsPre = Math.sqrt(rmsPre / raw.length);
    if (rmsPre < st.rmsPolar) return null;

    detrendLinear(raw);
    const detrended = new Float64Array(raw);
    const forFft = new Float64Array(detrended);
    applyHannWindow(forFft);

    const N = nextPow2(forFft.length);
    const padded = new Float64Array(N);
    padded.set(forFft);
    const { real, imag } = fftReal(padded);
    const mag = magnitudeSpectrum(real, imag);

    const df = measuredFps / N;
    const kMin = Math.max(1, Math.floor(0.3 / df));
    const kMax = Math.min(mag.length - 2, Math.floor((measuredFps * 0.48) / df));
    if (kMax < kMin) return null;

    const hw = pickBestKHarmonicWeighted(mag, kMin, kMax);
    let bestK = hw.bestK;
    let bestMag = mag[bestK];

    let kHarm = Math.round(bestK * bladeCount);
    if (kHarm >= kMin && kHarm <= kMax && kHarm !== bestK && mag[kHarm] >= mag[bestK] * 0.32) {
      bestK = kHarm;
      bestMag = mag[bestK];
    }

    let sumMag = 0;
    for (let k = kMin; k <= kMax; k++) sumMag += mag[k];
    const nBand = kMax - kMin + 1;
    const confidence = sumMag > 1e-9 ? Math.min(1, bestMag / (sumMag / nBand)) : 0;

    const band = new Float64Array(nBand);
    for (let i = 0; i < nBand; i++) band[i] = mag[kMin + i];
    band.sort((a, b) => a - b);
    const medianMag = band[Math.floor(nBand / 2)] || 0;
    const prominence = bestMag / (medianMag + 1e-15);

    let secondMag = 0;
    for (let k = kMin; k <= kMax; k++) {
      if (k === bestK) continue;
      if (mag[k] > secondMag) secondMag = mag[k];
    }
    const peakToSecond = bestMag / (secondMag + 1e-15);

    let logSumMag = 0;
    for (let k = kMin; k <= kMax; k++) logSumMag += Math.log(mag[k] + 1e-12);
    const geoMeanMag = Math.exp(logSumMag / nBand);
    const arithMeanMag = sumMag / nBand;
    const flatness = geoMeanMag / (arithMeanMag + 1e-15);

    if (
      confidence < st.cMin ||
      prominence < st.prom ||
      peakToSecond < st.p2s ||
      flatness > st.flat
    ) {
      return null;
    }

    const kRef = parabolicPeakBin(mag, bestK);
    const fPeak = kRef * df;

    const rpmOut = computeRpmFromPeakHz(fPeak, bladeCount);
    if (!rpmOut) return null;

    return {
      rpm: rpmOut.rpm,
      fPass: rpmOut.fPass,
      fRot: rpmOut.fRot,
      confidence,
      bestMag,
      sumMag,
      prominence,
    };
  }

  /** 主峰频率视为叶尖通过频率 (Hz)，与叶片数换算轴转速 RPM */
  function computeRpmFromPeakHz(fPeak, bladeCount) {
    const fPass = fPeak;
    const fRot = fPass / bladeCount;
    const rpm = fRot * 60;
    const rpmPhysicsCeil = measuredFps * 0.48 * 60 * 1.22;
    if (rpm > rpmPhysicsCeil) return null;
    return { rpm, fPass, fRot };
  }

  function analyze() {
    if (samplesPolar.length < 64) return;
    if (samplesPolar.length !== sampleTimes.length) {
      return;
    }

    const bladeCount = Math.max(2, parseInt(bladesEl.value, 10) || 3);
    const t0 = sampleTimes[0];
    const t1 = sampleTimes[sampleTimes.length - 1];
    const duration = (t1 - t0) / 1000;
    const fpsFromWindow = sampleTimes.length / Math.max(duration, 0.01);
    const fpsMedian = effectiveFpsFromTimes(sampleTimes);
    measuredFps = fpsMedian * 0.84 + fpsFromWindow * 0.16;

    const res = analyzeSeries(samplesPolar, bladeCount);

    if (!res) {
      rpmDisplay.textContent = "—";
      hzOut.textContent = "—";
      confOut.textContent = "低";
      bladeOut.textContent = String(bladeCount);
      statusEl.textContent =
        "未检测到稳定周期：请把十字对准转轴中心、邻域含清晰边缘，或延长采样。";
      return;
    }

    const { rpm, fPass, confidence } = res;
    const cf = getSpectralThresholds().cMin;
    bladeOut.textContent = String(bladeCount);
    confOut.textContent =
      confidence >= cf ? (confidence * 100).toFixed(0) + "%" : "低";

    if (confidence >= cf && rpm > 5 && rpm < 200000) {
      rpmDisplay.textContent = Math.round(rpm).toLocaleString("zh-CN");
      hzOut.textContent = fPass > 0.05 ? fPass.toFixed(2) : "—";
    } else {
      rpmDisplay.textContent = "—";
      hzOut.textContent = "—";
    }

    if (confidence <= cf) {
      statusEl.textContent =
        "信号较弱：请确认十字对准转轴中心、邻域含清晰边缘，或延长采样。";
    } else {
      statusEl.textContent =
        "约 " +
        measuredFps.toFixed(0) +
        " fps · 窗口 " +
        samplesPolar.length +
        " 点 · FFT · 主峰";
    }
  }

  function sampleFrame(now) {
    if (!running) return;

    if (video.readyState < 2) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }

    const w = video.videoWidth;
    const h = video.videoHeight;
    if (!w || !h) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }

    const dt = lastFrameTime ? now - lastFrameTime : 0;
    const minGap = video.requestVideoFrameCallback ? 0 : 28;
    if (lastFrameTime && dt < minGap) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }
    lastFrameTime = now;

    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);

    const ps = getPatchSideOdd();
    const half = (ps - 1) >> 1;
    let cx = Math.round(refUserPlaced ? refNx * (w - 1) : 0.5 * (w - 1));
    let cy = Math.round(refUserPlaced ? refNy * (h - 1) : 0.5 * (h - 1));
    const x0 = Math.max(0, Math.min(w - ps, cx - half));
    const y0 = Math.max(0, Math.min(h - ps, cy - half));

    const img = ctx.getImageData(x0, y0, ps, ps);
    const d = img.data;
    const nPix = ps * ps;
    const gray = new Float32Array(nPix);
    for (let gi = 0, p = 0; gi < nPix; gi++, p += 4) {
      gray[gi] = 0.299 * d[p] + 0.587 * d[p + 1] + 0.114 * d[p + 2];
    }
    updateRefMarkers();
    const phiRaw = computePolarGradientCentroidAngle(gray, ps);
    const phiUnwrapped = unwrapPolarAngle(phiRaw);

    const bufSec = parseInt(bufferEl.value, 10) || 4;
    const maxSamples = Math.floor(measuredFps * bufSec * 1.5) || 512;

    sampleTimes.push(now);
    samplesPolar.push(phiUnwrapped);
    while (samplesPolar.length > maxSamples) {
      samplesPolar.shift();
      sampleTimes.shift();
    }

    analyze();

    if (video.requestVideoFrameCallback) {
      vfcHandle = video.requestVideoFrameCallback(sampleFrame);
    } else {
      rafId = requestAnimationFrame(sampleFrame);
    }
  }

  async function start() {
    setErr("");
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60, max: 60 },
        },
        audio: false,
      });
    } catch (e) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false,
        });
      } catch (e2) {
        setErr("无法打开摄像头：" + (e2.message || "请检查权限与 HTTPS/本地环境。"));
        return;
      }
    }

    video.srcObject = stream;
    video.playsInline = true;
    video.muted = true;
    await video.play();

    running = true;
    lastFrameTime = 0;
    samplesPolar = [];
    sampleTimes = [];
    resetPolarUnwrap();
    refUserPlaced = false;
    refNx = 0.5;
    refNy = 0.5;
    refPickMode = false;
    refTapLayer.classList.remove("active");
    pickRefBtn.textContent = "点选参照位置";
    pickRefBtn.disabled = false;
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "分析中…";

    if (video.videoWidth && video.videoHeight) updateRefMarkers();

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings?.() || {};
    if (settings.frameRate) measuredFps = settings.frameRate;

    const onMeta = () => {
      updateRefMarkers();
      video.removeEventListener("loadedmetadata", onMeta);
    };
    video.addEventListener("loadedmetadata", onMeta);

    if (video.requestVideoFrameCallback) {
      vfcHandle = video.requestVideoFrameCallback(sampleFrame);
    } else {
      rafId = requestAnimationFrame(sampleFrame);
    }
  }

  function stop() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
    if (video.cancelVideoFrameCallback && vfcHandle) {
      try {
        video.cancelVideoFrameCallback(vfcHandle);
      } catch (_) {}
    }
    vfcHandle = 0;
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
      stream = null;
    }
    video.srcObject = null;
    pickRefBtn.disabled = true;
    refPickMode = false;
    refTapLayer.classList.remove("active");
    refMarker.style.visibility = "hidden";
    refPatchRing.style.visibility = "hidden";
    startBtn.disabled = false;
    stopBtn.disabled = true;
    rpmDisplay.textContent = "—";
    confOut.textContent = "—";
    hzOut.textContent = "—";
    statusEl.textContent = "已停止";
  }

  bladesEl.addEventListener("input", () => {
    bladeVal.textContent = bladesEl.value;
    if (running) analyze();
  });
  bufferEl.addEventListener("input", () => {
    bufVal.textContent = bufferEl.value;
  });
  patchSizeEl.addEventListener("input", () => {
    patchValEl.textContent = patchSizeEl.value;
    if (running) {
      samplesPolar = [];
      sampleTimes = [];
      resetPolarUnwrap();
      if (video.videoWidth && video.videoHeight) updateRefMarkers();
    }
  });

  function toggleRefPickMode() {
    if (!running) return;
    refPickMode = !refPickMode;
    refTapLayer.classList.toggle("active", refPickMode);
    refTapLayer.setAttribute("aria-hidden", refPickMode ? "false" : "true");
    pickRefBtn.textContent = refPickMode ? "点击画面完成" : "点选参照位置";
    stageCaption.textContent = refPickMode
      ? "在画面上点击转轴中心（轮毂），邻域需盖住有边缘的扇叶区域"
      : "参照点邻域采样 · 点「点选参照」后在画面上点击";
  }

  function onRefPointerDown(e) {
    if (!refPickMode || !running) return;
    e.preventDefault();
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return;
    const p = clientToVideoPx(e.clientX, e.clientY, video, vw, vh);
    refNx = p.x / Math.max(1, vw - 1);
    refNy = p.y / Math.max(1, vh - 1);
    refUserPlaced = true;
    refPickMode = false;
    refTapLayer.classList.remove("active");
    refTapLayer.setAttribute("aria-hidden", "true");
    pickRefBtn.textContent = "点选参照位置";
    stageCaption.textContent = "参照点邻域采样 · 点「点选参照」后可重新选点";
    updateRefMarkers();
  }

  pickRefBtn.addEventListener("click", toggleRefPickMode);
  refTapLayer.addEventListener("pointerdown", onRefPointerDown);

  window.addEventListener("resize", () => {
    if (running) updateRefMarkers();
  });

  startBtn.addEventListener("click", start);
  stopBtn.addEventListener("click", stop);

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && running) stop();
  });
})();
  </script>
</body>
</html>
