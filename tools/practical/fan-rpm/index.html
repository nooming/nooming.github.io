<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="用手机摄像头对准旋转风扇，根据画面亮度变化频率估算转速（RPM）。需授权摄像头，建议在 HTTPS 或本地环境使用。" />
  <meta name="keywords" content="风扇转速,RPM,转速估算,摄像头,在线工具" />
  <meta name="theme-color" content="#0a0e14" />
  <title>风扇转速估算 - 实用工具</title>

  <link rel="apple-touch-icon" sizes="180x180" href="../../../favicon-io/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="../../../favicon-io/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../../favicon-io/favicon-16x16.png" />
  <link rel="manifest" href="../../../favicon-io/site.webmanifest" />
  <link rel="shortcut icon" href="../../../favicon-io/favicon.ico" />

  <link rel="stylesheet" href="../../../common/css/common.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    .fan-rpm-shell {
      --bg: #0a0e14;
      --surface: #121820;
      --text: #e8edf4;
      --muted: #7d8a9a;
      --accent: #3dd6c6;
      --accent-dim: rgba(61, 214, 198, 0.15);
      --danger: #ff6b6b;
      --radius: 14px;
      --font: "DM Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      box-sizing: border-box;
      max-width: 520px;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      -webkit-tap-highlight-color: transparent;
    }
    .fan-rpm-shell * { box-sizing: border-box; }
    .fan-rpm-shell .sub {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.45;
      margin: 0 0 16px;
    }
    .fan-rpm-shell .stage {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    /* 仅裁剪画面圆角，说明文字在下方单独一行，避免 overflow:hidden 裁掉 ::after */
    .fan-rpm-shell .stage-viewport {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: var(--radius);
      background: #000;
    }
    .fan-rpm-shell .stage-caption {
      margin: 10px 4px 0;
      padding-bottom: 2px;
      text-align: center;
      font-size: 11px;
      line-height: 1.45;
      color: var(--accent);
      text-shadow: 0 1px 2px #000;
      word-break: break-word;
    }
    .fan-rpm-shell video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .fan-rpm-shell canvas { display: none; }
    .fan-rpm-shell .roi {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(65%, 72vw);
      aspect-ratio: 1 / 1;
      height: auto;
      max-height: 100%;
      border: 2px solid var(--accent);
      border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4) inset;
      pointer-events: none;
      opacity: 0.85;
    }
    .fan-rpm-shell .panel {
      margin-top: 18px;
      padding: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .fan-rpm-shell .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .fan-rpm-shell .row:last-child { margin-bottom: 0; }
    .fan-rpm-shell label { font-size: 0.9rem; color: var(--muted); }
    .fan-rpm-shell input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .fan-rpm-shell .value {
      min-width: 2.5rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--accent);
    }
    .fan-rpm-shell .readout {
      text-align: center;
      padding: 20px 12px;
      background: var(--accent-dim);
      border-radius: var(--radius);
      margin-bottom: 14px;
    }
    .fan-rpm-shell .readout .rpm-num {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .fan-rpm-shell .readout .unit { font-size: 1rem; font-weight: 500; color: var(--muted); margin-left: 4px; }
    .fan-rpm-shell .readout .meta {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .fan-rpm-shell .btn {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(145deg, #2ebfaf, var(--accent));
      color: #041210;
      margin-bottom: 10px;
    }
    .fan-rpm-shell .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .fan-rpm-shell .btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .fan-rpm-shell .hint {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 12px;
    }
    .fan-rpm-shell .err {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 8px;
    }
    .fan-rpm-shell .status { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body class="page-container">
  <div class="page-header">
    <div class="header-top">
      <a href="../" class="back-btn">返回上一级</a>
    </div>
    <h1 class="page-title">风扇转速估算</h1>
  </div>

  <main class="fan-rpm-shell">
    <p class="sub">用手机摄像头对准旋转的风扇，让中间绿框覆盖「扇叶扫过、明暗变化明显」的一条窄带。系统根据画面亮度变化频率估算转速。</p>

    <div class="stage">
      <div class="stage-viewport">
        <video id="video" playsinline muted></video>
        <div class="roi" aria-hidden="true"></div>
      </div>
      <p class="stage-caption">采样区域 · 对准扇叶边缘对比明显处</p>
    </div>
    <canvas id="work"></canvas>

    <div class="panel">
      <div class="readout">
        <span class="rpm-num" id="rpmDisplay">—</span><span class="unit">RPM</span>
        <div class="meta">
          叶片数 <strong id="bladeOut">3</strong> · 置信度 <strong id="confOut">—</strong>
          · 约 <strong id="hzOut">—</strong> Hz（叶尖通过频率）
        </div>
      </div>
      <div class="row">
        <label for="blades">叶片数量</label>
        <input type="range" id="blades" min="2" max="8" value="3" />
        <span class="value" id="bladeVal">3</span>
      </div>
      <div class="row">
        <label for="buffer">采样时长（秒）</label>
        <input type="range" id="buffer" min="2" max="12" value="4" step="1" />
        <span class="value" id="bufVal">4</span>
      </div>
      <button type="button" class="btn" id="startBtn">开启摄像头并开始</button>
      <button type="button" class="btn secondary" id="stopBtn" disabled>停止</button>
      <p class="hint">
        说明：转速上限受相机帧率限制（多数手机约 30fps，约可估到每分钟几百转量级；若设备支持 60fps 会更高）。环境光尽量稳定，避免频闪灯；扇叶与背景对比越强越准。已启用帧间隔统计、去漂移、加窗与频谱细化，可适当<strong>拉长采样时长</strong>提高低频分辨率。
      </p>
      <p class="err" id="errBox" hidden></p>
      <p class="status" id="status"></p>
    </div>
  </main>

  <script src="../../../common/js/utils.js" defer></script>
  <script>
(function () {
  const video = document.getElementById("video");
  const canvas = document.getElementById("work");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const bladesEl = document.getElementById("blades");
  const bufferEl = document.getElementById("buffer");
  const bladeVal = document.getElementById("bladeVal");
  const bufVal = document.getElementById("bufVal");
  const rpmDisplay = document.getElementById("rpmDisplay");
  const bladeOut = document.getElementById("bladeOut");
  const confOut = document.getElementById("confOut");
  const hzOut = document.getElementById("hzOut");
  const errBox = document.getElementById("errBox");
  const statusEl = document.getElementById("status");

  let stream = null;
  let running = false;
  let rafId = 0;
  let vfcHandle = 0;
  let lastFrameTime = 0;
  let sampleTimes = [];
  let samples = [];
  let measuredFps = 30;

  function setErr(msg) {
    if (msg) {
      errBox.hidden = false;
      errBox.textContent = msg;
    } else {
      errBox.hidden = true;
    }
  }

  function nextPow2(n) {
    let p = 1;
    while (p < n) p <<= 1;
    return p;
  }

  function fftReal(input) {
    const n = input.length;
    const real = new Float64Array(input);
    const imag = new Float64Array(n);
    for (let i = 0; i < n; i++) imag[i] = 0;
    let j = 0;
    for (let i = 1; i < n; i++) {
      let bit = n >> 1;
      for (; j & bit; bit >>= 1) j ^= bit;
      j ^= bit;
      if (i < j) {
        const tr = real[i];
        real[i] = real[j];
        real[j] = tr;
      }
    }
    for (let len = 2; len <= n; len <<= 1) {
      const half = len >> 1;
      const ang = (-2 * Math.PI) / len;
      const wlenR = Math.cos(ang);
      const wlenI = Math.sin(ang);
      for (let i = 0; i < n; i += len) {
        let wr = 1;
        let wi = 0;
        for (let k = 0; k < half; k++) {
          const i0 = i + k;
          const i1 = i0 + half;
          const r0 = real[i0];
          const i0i = imag[i0];
          const r1 = real[i1];
          const i1i = imag[i1];
          const tr = wr * r1 - wi * i1i;
          const ti = wr * i1i + wi * r1;
          real[i1] = r0 - tr;
          imag[i1] = i0i - ti;
          real[i0] = r0 + tr;
          imag[i0] = i0i + ti;
          const nwr = wr * wlenR - wi * wlenI;
          wi = wr * wlenI + wi * wlenR;
          wr = nwr;
        }
      }
    }
    return { real, imag };
  }

  function magnitudeSpectrum(real, imag) {
    const n = real.length;
    const mag = new Float64Array(n / 2);
    for (let k = 0; k < n / 2; k++) {
      mag[k] = Math.hypot(real[k], imag[k]);
    }
    return mag;
  }

  /** 用帧间隔中位数估计有效帧率，比「点数/总时长」更抗偶发掉帧 */
  function effectiveFpsFromTimes(times) {
    if (times.length < 2) return measuredFps;
    const gaps = [];
    for (let i = 1; i < times.length; i++) {
      const g = times[i] - times[i - 1];
      if (g > 0 && g < 500) gaps.push(g);
    }
    if (gaps.length === 0) return measuredFps;
    gaps.sort((a, b) => a - b);
    const mid = gaps[Math.floor(gaps.length / 2)];
    return Math.min(240, Math.max(5, 1000 / mid));
  }

  /** 去线性漂移，减轻慢变亮度对低频的干扰 */
  function detrendLinear(arr) {
    const n = arr.length;
    if (n < 4) return;
    let sx = 0;
    let sy = 0;
    let sxx = 0;
    let sxy = 0;
    for (let i = 0; i < n; i++) {
      sx += i;
      sy += arr[i];
      sxx += i * i;
      sxy += i * arr[i];
    }
    const den = n * sxx - sx * sx;
    if (Math.abs(den) < 1e-12) return;
    const slope = (n * sxy - sx * sy) / den;
    const intercept = (sy - slope * sx) / n;
    for (let i = 0; i < n; i++) arr[i] -= slope * i + intercept;
  }

  /** Hann 窗，减轻有限长序列的频谱泄漏 */
  function applyHannWindow(arr) {
    const n = arr.length;
    if (n < 2) return;
    const nm1 = n - 1;
    for (let i = 0; i < n; i++) {
      arr[i] *= 0.5 * (1 - Math.cos((2 * Math.PI * i) / nm1));
    }
  }

  /** 频域抛物线插值，得到亚 bin 的峰值频率 */
  function parabolicPeakBin(mag, k) {
    if (k <= 0 || k >= mag.length - 1) return k;
    const a = mag[k - 1];
    const b = mag[k];
    const c = mag[k + 1];
    const denom = a - 2 * b + c;
    if (Math.abs(denom) < 1e-12) return k;
    const delta = 0.5 * (a - c) / denom;
    if (delta < -0.5 || delta > 0.5) return k;
    return k + delta;
  }

  function analyze() {
    if (samples.length < 64) return;
    const bladeCount = Math.max(2, parseInt(bladesEl.value, 10) || 3);
    const t0 = sampleTimes[0];
    const t1 = sampleTimes[sampleTimes.length - 1];
    const duration = (t1 - t0) / 1000;
    const fpsFromWindow = sampleTimes.length / Math.max(duration, 0.01);
    const fpsMedian = effectiveFpsFromTimes(sampleTimes);
    measuredFps = fpsMedian * 0.65 + fpsFromWindow * 0.35;

    const raw = new Float64Array(samples);
    let mean = 0;
    for (let i = 0; i < raw.length; i++) mean += raw[i];
    mean /= raw.length;
    for (let i = 0; i < raw.length; i++) raw[i] -= mean;

    detrendLinear(raw);
    applyHannWindow(raw);

    const N = nextPow2(raw.length);
    const padded = new Float64Array(N);
    padded.set(raw);
    const { real, imag } = fftReal(padded);
    const mag = magnitudeSpectrum(real, imag);

    const df = measuredFps / N;
    const kMin = Math.max(1, Math.floor(0.3 / df));
    const kMax = Math.min(mag.length - 2, Math.floor((measuredFps * 0.48) / df));
    if (kMax < kMin) return;

    let bestK = kMin;
    let bestMag = 0;
    for (let k = kMin; k <= kMax; k++) {
      if (mag[k] > bestMag) {
        bestMag = mag[k];
        bestK = k;
      }
    }

    let sumMag = 0;
    for (let k = kMin; k <= kMax; k++) sumMag += mag[k];
    const confidence = sumMag > 1e-9 ? Math.min(1, bestMag / (sumMag / (kMax - kMin + 1))) : 0;

    const kRef = parabolicPeakBin(mag, bestK);
    const fPass = kRef * df;
    const fRot = fPass / bladeCount;
    const rpm = fRot * 60;

    rpmDisplay.textContent = rpm > 5 && rpm < 200000 && confidence > 0.15
      ? Math.round(rpm).toLocaleString("zh-CN")
      : "—";
    bladeOut.textContent = String(bladeCount);
    confOut.textContent = confidence > 0.15 ? (confidence * 100).toFixed(0) + "%" : "低";
    hzOut.textContent = fPass > 0.05 ? fPass.toFixed(2) : "—";

    if (confidence <= 0.15) {
      statusEl.textContent = "信号较弱：请对准扇叶、提高对比度或延长采样时间。";
    } else {
      statusEl.textContent = "约 " + measuredFps.toFixed(0) + " fps · 窗口 " + samples.length + " 点 · 细化频谱";
    }
  }

  function sampleFrame(now) {
    if (!running) return;

    if (video.readyState < 2) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }

    const w = video.videoWidth;
    const h = video.videoHeight;
    if (!w || !h) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }

    const dt = lastFrameTime ? now - lastFrameTime : 0;
    const minGap = video.requestVideoFrameCallback ? 0 : 28;
    if (lastFrameTime && dt < minGap) {
      if (video.requestVideoFrameCallback) {
        vfcHandle = video.requestVideoFrameCallback(sampleFrame);
      } else {
        rafId = requestAnimationFrame(sampleFrame);
      }
      return;
    }
    lastFrameTime = now;

    canvas.width = w;
    canvas.height = h;
    ctx.drawImage(video, 0, 0, w, h);

    const side = Math.max(8, Math.floor(Math.min(w, h) * 0.65));
    const x0 = Math.floor((w - side) / 2);
    const y0 = Math.floor((h - side) / 2);

    const img = ctx.getImageData(x0, y0, side, side);
    const d = img.data;
    let sum = 0;
    const step = 4 * 4;
    for (let i = 0; i < d.length; i += step) {
      sum += 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
    }
    const count = d.length / (4 * 4);
    const lum = count > 0 ? sum / count : 0;

    const bufSec = parseInt(bufferEl.value, 10) || 4;
    const maxSamples = Math.floor(measuredFps * bufSec * 1.5) || 512;

    sampleTimes.push(now);
    samples.push(lum);
    while (samples.length > maxSamples) {
      samples.shift();
      sampleTimes.shift();
    }

    analyze();

    if (video.requestVideoFrameCallback) {
      vfcHandle = video.requestVideoFrameCallback(sampleFrame);
    } else {
      rafId = requestAnimationFrame(sampleFrame);
    }
  }

  async function start() {
    setErr("");
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 60, max: 60 },
        },
        audio: false,
      });
    } catch (e) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false,
        });
      } catch (e2) {
        setErr("无法打开摄像头：" + (e2.message || "请检查权限与 HTTPS/本地环境。"));
        return;
      }
    }

    video.srcObject = stream;
    video.playsInline = true;
    video.muted = true;
    await video.play();

    running = true;
    lastFrameTime = 0;
    samples = [];
    sampleTimes = [];
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusEl.textContent = "分析中…";

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings?.() || {};
    if (settings.frameRate) measuredFps = settings.frameRate;

    if (video.requestVideoFrameCallback) {
      vfcHandle = video.requestVideoFrameCallback(sampleFrame);
    } else {
      rafId = requestAnimationFrame(sampleFrame);
    }
  }

  function stop() {
    running = false;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = 0;
    if (video.cancelVideoFrameCallback && vfcHandle) {
      try {
        video.cancelVideoFrameCallback(vfcHandle);
      } catch (_) {}
    }
    vfcHandle = 0;
    if (stream) {
      stream.getTracks().forEach((t) => t.stop());
      stream = null;
    }
    video.srcObject = null;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    rpmDisplay.textContent = "—";
    confOut.textContent = "—";
    hzOut.textContent = "—";
    statusEl.textContent = "已停止";
  }

  bladesEl.addEventListener("input", () => {
    bladeVal.textContent = bladesEl.value;
    if (running) analyze();
  });
  bufferEl.addEventListener("input", () => {
    bufVal.textContent = bufferEl.value;
  });

  startBtn.addEventListener("click", start);
  stopBtn.addEventListener("click", stop);

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && running) stop();
  });
})();
  </script>
</body>
</html>
