<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <meta name="keywords" content="在线转盘,随机选择,抽奖工具,选择困难症,决策工具">
    
    <title>在线转盘 - 免费随机选择工具</title>

    <link rel="apple-touch-icon" sizes="180x180" href="../../../favicon-io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../../favicon-io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../../favicon-io/favicon-16x16.png">
    <link rel="manifest" href="../../../favicon-io/site.webmanifest">
    <link rel="shortcut icon" href="../../../favicon-io/favicon.ico">

    <link as="style" href="../assets/css/style.min.css" rel="preload">
    <link href="../assets/css/style.min.css" rel="stylesheet">
    <style>
        /* 统一背景样式 */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%) !important;
            min-height: 100vh;
        }
        
        main {
            margin: 0 !important;
            padding: 0 !important;
        }
        
        /* 页面头部布局 */
        header {
            padding: 10px 20px !important;
            margin-bottom: 0 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            position: relative !important;
        }
        
        /* 移除椭圆/圆形背景，使用现代扁平设计 */
        .header-left-box {
            background-color: transparent !important;
            border-radius: 0 !important;
            height: auto !important;
            flex-shrink: 0 !important;
        }
        .header-center-box {
            position: absolute !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            background: transparent !important;
            border-radius: 0 !important;
            width: auto !important;
            height: auto !important;
            margin: 0 !important;
        }
        
        .header-center-box h1 {
            font-size: 1.4rem !important;
            font-weight: 700 !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
            letter-spacing: -0.5px !important;
            white-space: nowrap !important;
            margin: 0 0 3px 0 !important;
        }
        .header-right-box {
            background-color: transparent !important;
            border-radius: 0 !important;
            height: auto !important;
            flex-shrink: 0 !important;
        }
        .nav-links a {
            border-radius: 0 !important;
            background-color: transparent !important;
            position: relative !important;
            border-bottom: 2px solid transparent !important;
            transition: all 0.3s ease !important;
        }
        .nav-links a:hover {
            background-color: transparent !important;
            border-bottom-color: #3498db !important;
            color: #3498db !important;
        }
        .header-left-content-box a {
            padding: 9px 18px !important;
            border-radius: 10px !important;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
            color: white !important;
            text-decoration: none !important;
            font-weight: 500 !important;
            transition: all 0.3s ease !important;
            display: inline-block !important;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3) !important;
        }
        .header-left-content-box a:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%) !important;
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4) !important;
            border-bottom: none !important;
        }
        .wheel-box {
            margin: 0 !important;
            padding: 0 !important;
            background-color: transparent !important;
            border-radius: 0 !important;
            width: auto !important;
            height: auto !important;
        }
        
        .wheel-scope-box {
            margin-left: 0 !important;
            margin-right: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
        }
        
        footer {
            text-align: center !important;
            margin-top: 30px !important;
            padding-top: 15px !important;
            color: #95a5a6 !important;
            border-top: 1px solid #ecf0f1 !important;
            font-size: 0.85rem !important;
            width: 100% !important;
        }
        footer p {
            text-align: center !important;
            margin: 0 auto !important;
        }
        /* 精简导航 */
        .nav-links {
            gap: 15px !important;
        }
        .nav-links a {
            font-size: 0.9rem !important;
            padding: 5px 10px !important;
        }
        /* 隐藏语言选择器 */
        .language-selector {
            display: none !important;
        }
        /* 图标提示样式 */
        .wheel-panel-operate-change-box,
        .wheel-panel-operate-preset-box {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            padding: 5px !important;
        }
        .wheel-panel-operate-change-box:hover,
        .wheel-panel-operate-preset-box:hover {
            background-color: rgba(52, 152, 219, 0.1) !important;
            border-radius: 4px !important;
        }
        /* 移动端适配 */
        @media (max-width: 767.98px) {
            header {
                padding: 10px 12px !important;
                height: auto !important;
                min-height: 64px !important;
                flex-wrap: wrap !important;
            }
            .header-left-box {
                flex: 0 0 auto !important;
                min-width: auto !important;
                width: auto !important;
            }
            .header-left-content-box {
                width: auto !important;
                margin-right: 8px !important;
            }
            .header-center-box {
                position: absolute !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                flex: none !important;
                min-width: 0 !important;
                margin: 0 !important;
                width: auto !important;
            }
            .header-center-box h1 {
                font-size: 1.5rem !important;
                white-space: normal !important;
                max-width: 60% !important;
                text-align: center !important;
            }
            .header-right-box {
                flex: 0 0 auto !important;
                min-width: 0 !important;
                width: auto !important;
                margin-left: 0 !important;
            }
            .header-right-content-box {
                width: auto !important;
                margin-left: 0 !important;
            }
            .nav-links {
                display: flex !important;
                gap: 8px !important;
                flex-wrap: wrap !important;
            }
            .nav-links a {
                display: flex !important;
                font-size: 0.8rem !important;
                padding: 6px 12px !important;
                white-space: nowrap !important;
            }
            .header-left-content-box a {
                padding: 6px 12px !important;
            }
        }
        @media (max-width: 480px) {
            .header-center-box h1 {
                font-size: 1rem !important;
            }
            .nav-links {
                gap: 6px !important;
            }
            .nav-links a {
                font-size: 0.75rem !important;
                padding: 5px 10px !important;
            }
            .header-left-content-box a {
                padding: 5px 10px !important;
            }
        }
    </style>

    <link as="script" href="../assets/js/script.min.js" rel="preload">

    <link rel="preload" href="../assets/css/spin.min.css" as="style">
    <link href="../assets/css/spin.min.css" rel="stylesheet">

    <link rel="preload" href="../assets/js/wheel.min.js" as="script">
    <link rel="preload" href="../assets/js/jscolor.min.js" as="script">

    <link rel="preload" href="../assets/js/spin.min.js" as="script">

</head>
<body>
<header>
    <div class="header-left-box">
        <div class="header-left-content-box">
            <a href="../" style="text-decoration: none; color: #2c3e50; font-weight: 500; font-size: 0.85rem;">
                返回上一级
            </a>
        </div>
    </div>
    <div class="header-center-box">
        <h1 style="margin: 0 0 3px 0; font-size: 1.4rem; font-weight: 600; color: #2c3e50; white-space: nowrap;">在线转盘</h1>
    </div>
    <div class="header-right-box">
        <div class="header-right-content-box">
            <nav class="nav-links">
                <a href="../coin-flip/">抛硬币</a>
                <a href="../quick-choice/">快速选择</a>
            </nav>
        </div>
    </div>
</header>
<main>
    <section id="spin" aria-label="互动转盘工具" class="wheel-box">
        <div class="wheel-scope-box">
            <div class="wheel-scope-left-box">
                <div class="my-wheel-box" id="myWheelBox">
                    <div id="my-wheel">
                        <!-- Spin the Wheel Rendering -->
                    </div>
                </div>
            </div>
            <div class="wheel-scope-center-box" onclick="theExpandMode()">
                <!-- Center point, Enlargeable Spin the Wheel -->
            </div>
            <div class="wheel-scope-right-box">
                <div class="wheel-panel-box">
                    <div class="wheel-panel-operate-box">
                        <div class="wheel-panel-operate-left-box">
                            <div class="wheel-panel-operate-entries-box" onclick="switchToEntriesMode()" role="button" tabindex="0" aria-label="切换到选项模式">
                                选项
                            </div>
                            <div class="wheel-panel-operate-results-box" onclick="switchToResultsMode()" role="button" tabindex="0" aria-label="切换到结果模式">
                                结果
                            </div>
                        </div>
                        <div class="wheel-panel-operate-right-box">
                            <div class="wheel-panel-operate-change-box" onclick="switchToChangeMode()" aria-label="切换模式" title="切换模式：在简单模式和高级模式之间切换">
                                <span style="font-size: 1.2rem;">🍃</span>
                                <span style="font-size: 0.75rem; display: block; margin-top: 2px; color: #7f8c8d;">切换模式</span>
                            </div>
                            <div class="wheel-panel-operate-preset-box" aria-label="预设管理" title="预设管理：保存和加载常用选项组合">
                                <span style="font-size: 1.2rem;">🍂</span>
                                <span style="font-size: 0.75rem; display: block; margin-top: 2px; color: #7f8c8d;">预设</span>
                                <div class="wheel-preset-box">
                                    <div class="wheel-preset-text-box">
                                        <div class="wheel-preset-text-add-box">
                                            <div class="wheel-preset-text-add-input-box">
                                                <input placeholder="输入预设...">
                                            </div>
                                            <div class="wheel-preset-text-add-add-box">
                                                <div class="wheel-preset-text-add-add-inner-box" aria-label="添加预设">
                                                    +
                                                </div>
                                            </div>
                                        </div>
                                        <div class="wheel-preset-text-list-box">
                                            <div class="wheel-preset-text-overflow-box">
                                                <div class="wheel-preset-text-item-box">
                                                    <!-- JS-generated elements -->
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="wheel-panel-entries-box">
                        <div class="wheel-panel-entries-operate-box">
                            <div class="wheel-panel-entries-operate-left-box">
                                <div class="wheel-panel-entries-operate-shuffle-box" onclick="entriesShuffleSwitchClick()" role="button" tabindex="0" aria-label="随机选项">
                                    随机
                                </div>
                                <div class="wheel-panel-entries-operate-sort-box" onclick="entriesSortSwitchClick()" role="button" tabindex="0" aria-label="排序选项">
                                    排序
                                </div>
                                <div class="wheel-panel-entries-operate-advanced-box" onclick="switchToAdvancedMode()" role="button" tabindex="0" aria-label="切换到高级模式">
                                    高级
                                </div>
                            </div>
                        </div>
                        <div class="wheel-panel-entries-inputs-box">
                            <div class="wheel-panel-entries-inputs-text-box">
                                <textarea id="prize-input" placeholder="输入选项..." wrap="off"></textarea>
                            </div>
                        </div>
                        <div class="wheel-panel-entries-advanced-box">
                            <div class="wheel-panel-entries-advanced-text-box">
                                <div class="wheel-panel-entries-advanced-text-add-box">
                                    <div class="wheel-panel-entries-advanced-text-add-input-box">
                                        <input placeholder="输入选项...">
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-background-color-box">
                                        <div class="wheel-panel-entries-advanced-text-add-background-color-inner-box" data-jscolor="" data-key="add-background-color">
                                            <!-- Custom background color -->
                                        </div>
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-color-box">
                                        <div class="wheel-panel-entries-advanced-text-add-color-inner-box" data-jscolor="" data-key="add-color-color">
                                            <!-- Custom font color -->
                                        </div>
                                    </div>
                                    <div class="wheel-panel-entries-advanced-text-add-add-box">
                                        <div class="wheel-panel-entries-advanced-text-add-add-inner-box" aria-label="添加选项">
                                            +
                                        </div>
                                    </div>
                                </div>
                                <div class="wheel-panel-entries-advanced-text-list-box">
                                    <div class="wheel-panel-entries-advanced-text-overflow-box" id="item-container">
                                        <!-- JS-generated elements -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="wheel-panel-results-box">
                        <div class="wheel-panel-results-operate-box">
                            <div class="wheel-panel-results-operate-left-box">
                                <div class="wheel-panel-results-operate-shuffle-box" onclick="resultsShuffleSwitchClick()" role="button" tabindex="0" aria-label="随机结果">
                                    随机
                                </div>
                                <div class="wheel-panel-results-operate-clear-box" onclick="resultsClearSwitchClick()" role="button" tabindex="0" aria-label="清除结果">
                                    清除
                                </div>
                            </div>
                        </div>
                        <div class="wheel-panel-results-inputs-box">
                            <div class="wheel-panel-results-inputs-text-box">
                                <textarea id="prize-result" readonly wrap="off"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

<footer>
    <p>© 2025 个人学习网站 | 仅用于学习交流，请勿用于商业用途</p>
</footer>

<div class="lucky-modal hidden" id="luckySuccessModal">
    <div class="lucky-modal-content">
        <h2>🎉🎉🎉</h2>
        <p id="luckyPrizeText">你获得了奖品</p>
        <button onclick="closeLuckyModal()" aria-label="关闭结果显示">关闭</button>
    </div>
</div>

<script defer src="../assets/js/script.min.js"></script>

<script defer src="../assets/js/wheel.min.js"></script>
<script defer src="../assets/js/jscolor.min.js"></script>

<script defer src="../assets/js/spin.min.js"></script>
</body>
</html>
