<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFFA00">
    <meta name="description" content="404：页面不存在或已移动。">
    <title>404 · 未找到</title>
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
    <link rel="manifest" href="/assets/icons/site.webmanifest">
    <link rel="shortcut icon" href="/assets/icons/favicon.ico">
    
    <!-- 公共样式 -->
    <link rel="stylesheet" href="/assets/css/common.css">
    
    <style>
        body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-container {
            text-align: center;
            background: white;
            border-radius: 0;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--gradient-theme-title);
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: unset;
            background-clip: unset;
            margin-bottom: 20px;
            line-height: 1;
        }
        
        .error-title {
            font-size: 2rem;
            color: var(--gradient-theme-title);
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: #5a6c7d;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 0;
            font-size: 1rem;
            text-decoration: none !important;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn-primary {
            background: var(--gradient-theme);
            color: var(--color-theme-ink) !important;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-tool);
        }
        
        .btn-secondary {
            background: white;
            color: var(--color-theme-text-end) !important;
            border: 2px solid var(--color-theme-deep);
        }
        
        .btn-secondary:hover {
            background: #fffde7;
            transform: translateY(-2px);
        }
        
        @media (max-width: 767.98px) {
            .error-container {
                padding: 40px 25px;
            }
            
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-message {
                font-size: 1rem;
            }
            
            .error-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">未找到页面</h1>
        <p class="error-message">
            链接可能已失效或地址有误。<br>
            可回主页，或使用浏览器返回。
        </p>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">返回主页</a>
            <a href="/app/navigation/" class="btn btn-secondary">返回上一级</a>
        </div>
    </div>
</body>
</html>
